<!DOCTYPE html>

<head>

<title>Epstein Network Graph</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;color:#e2e8f0;background-image:linear-gradient(rgba(148,163,184,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(148,163,184,0.04) 1px,transparent 1px);background-size:40px 40px}

.cal{background:rgba(245,158,11,0.08);border-left:3px solid #f59e0b;padding:11px 14px;border-radius:0 8px 8px 0;margin:10px 0;font-size:12px;color:#fbbf24;line-height:1.7}
.cal.red{background:rgba(239,68,68,0.08);border-left-color:#ef4444;color:#fca5a5}

<body>

  <h2>Display</h2>
  <label><input type="checkbox" id="labels" checked> Show labels</label>

</div>

<div id="tip"></div>

<div id="dos">
  <div class="cls-banner">NETWORK INTELLIGENCE DOSSIER — RESTRICTED</div>
  <div id="dos-hdr">
    <button id="dos-x">✕</button>
    <div id="dos-name"></div>
    <div id="dos-role"></div>
    <div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-top:6px">
      <span id="dos-status"></span>
      <span id="dos-nw"></span>
    </div>
  </div>
  <div id="dos-body"></div>
</div>

<canvas id="graph"></canvas>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="list.js?v=33"></script>
<script src="list2.js?v=33"></script>
<script src="dates.js?v=3"></script>
<script src="writeups.js?v=3"></script>
<script>
'use strict';

if(typeof supplementalData!=='undefined'){
  const ei=new Set(graphData.nodes.map(n=>n.id));
  for(const n of supplementalData.nodes) if(!ei.has(n.id)){graphData.nodes.push(n);ei.add(n.id);}
  const el=new Set(graphData.links.map(l=>l.source+'→'+l.target));
  for(const l of supplementalData.links){const k=l.source+'→'+l.target;if(!el.has(k)){graphData.links.push(l);el.add(k);}}
}

const categories={
  operational:["epstein","maxwell_g","kellen","marcinkova","groff","brunel","alessi","rodriguez","casablancas","gerald_marie","zampolli","wexner"],
  financial:["epstein","wexner","black","staley","dimon","hoffenberg","kravis","david_koch","burkle","pritzker","lutnick","bloomberg","mort_z","diller","barrack","dubin","eva_dubin","nat_rothschild","lynn_rothschild"],
  legal:["dershowitz","acosta","starr","boies","barr_d","barr_w","rosenstein","berman","strauss","freeh","mueller","comey","judge_marra"],
  intel:["epstein","maxwell_g","robert_maxwell","ben_menashe","ostrovsky","barak","netanyahu","black_cube","nahum_admoni","wexner","dershowitz","junkermann","kroll","peres","chaim_herzog","yitzhak_shamir","olmert","shabtai_shavit","barr_d","barr_w","brennan","petraeus","burns","freeh","mueller","comey","acosta","rosenstein","berman","sandy_berger","robert_hanssen","dennis_hastert","dougan","andrew","king_charles","ferguson","blair","boris_johnson","osborne","leon_brittan","cyril_smith","edward_heath","murdoch","mandelson","savile","maurice_oldfield","michael_hanley","anthony_blunt","peter_morrison","peter_hayman","putin","deripaska","manafort","rybolovlev","nat_rothschild","khashoggi","nader","mbs","sultan_ahmed","sultan_brunei","barrack","kushner","trump","juan_carlos"],
  intel_il:["epstein","maxwell_g","robert_maxwell","ben_menashe","ostrovsky","barak","netanyahu","black_cube","nahum_admoni","rafi_eitan","jonathan_pollard","chaim_herzog","yitzhak_shamir","olmert","shabtai_shavit","wexner","dershowitz","thiel","junkermann","peres","milchan"],
  intel_us:["epstein","barr_d","barr_w","brennan","petraeus","burns","freeh","mueller","comey","acosta","rosenstein","berman","sandy_berger","robert_hanssen","dennis_hastert","dougan"],
  intel_uk:["robert_maxwell","maxwell_g","andrew","king_charles","ferguson","blair","boris_johnson","evgeny_lebedev","lebedev","osborne","leon_brittan","cyril_smith","edward_heath","savile","maurice_oldfield","michael_hanley","anthony_blunt","peter_morrison","peter_hayman","rolf_harris","gary_glitter","max_clifford","chris_denning","peter_righton","sidney_cooke","tony_mcsweeney","john_stingemore","murdoch","mandelson"],
  intel_ru:["robert_maxwell","deripaska","putin","robert_hanssen","manafort","rybolovlev","nat_rothschild","dougan"],
  intel_ae:["khashoggi","nader","mbs","sultan_ahmed","sultan_brunei","barrack","kushner","trump","juan_carlos"],
  confirmed:["epstein","maxwell_g","brunel","weinstein","nader","dennis_hastert","savile","rolf_harris","gary_glitter","max_clifford","chris_denning","peter_righton","sidney_cooke","tony_mcsweeney","dershowitz","andrew","dubin","minsky","richardson","mitchell","clinton","barak","trump","hawking","branson","sultan_brunei","sultan_ahmed","nowak","musk","gerald_marie","casablancas","krauss","spacey","woody","lauer","charlie_rose","chopra","cyril_smith","leon_brittan","edward_heath","john_stingemore","peter_hayman","maurice_oldfield","michael_hanley","peter_morrison","anthony_blunt","marcinkova","copperfield","jack_lang","giuffre"],
  named:["andrew","mitchell","richardson","dubin","minsky","dershowitz","barak","clinton","trump","nader","giuffre"],
  cover:["epstein","maxwell_g","wexner","black","bronfman_c","bronfman_s","hawking","minsky","krauss","nowak","pinker","church","seth_lloyd","chomsky","ito","gates","summers","bob_wright","gutfreund","woody","charlie_rose","lauer","spacey","copperfield","chopra","naomi","handler","branson","jack_lang","juan_carlos","king_carl_xvi","john_podesta","lindsey_graham"],
  uncertain:["thiel","bezos","sergey_brin","larry_page","bloomberg","murdoch","pritzker","burkle","diller","mort_z","hawking","chopra","chaim_herzog","yitzhak_shamir","shabtai_shavit"]
};
const catNames={operational:"Operational",financial:"Financial",legal:"Legal Shield",intel:"Intelligence",intel_il:"🇮🇱 Mossad/IL",intel_us:"🇺🇸 CIA/FBI",intel_uk:"🇬🇧 MI5/MI6",intel_ru:"🇷🇺 KGB/FSB",intel_ae:"🇦🇪 Gulf",named:"Named by Victims",cover:"Social Cover",uncertain:"Uncertain",confirmed:"⚠ Confirmed"};
const C={center:"#ef4444",convicted:"#2dd4bf",suspicious:"#60a5fa",possibly:"#a78bfa"};
const Clight={center:"rgba(239,68,68,0.1)",convicted:"rgba(45,212,191,0.1)",suspicious:"rgba(96,165,250,0.1)",possibly:"rgba(167,139,250,0.1)"};
const Cborder={center:"rgba(239,68,68,0.25)",convicted:"rgba(45,212,191,0.25)",suspicious:"rgba(96,165,250,0.25)",possibly:"rgba(167,139,250,0.25)"};
const typeLabel={center:"PRINCIPAL TARGET",convicted:"CONVICTED",suspicious:"SUSPICIOUS",possibly:"POSSIBLY INVOLVED"};
const coreSet=new Set(categories.operational);
const confirmedSet=new Set(categories.confirmed);
const forceBlue=new Set(["staley","wexner","barr_d","rodriguez","alessi","robert_maxwell"]);

const canvas=document.getElementById('graph');
const ctx=canvas.getContext('2d');
const W=window.innerWidth,H=window.innerHeight;
canvas.width=W*devicePixelRatio; canvas.height=H*devicePixelRatio;
canvas.style.width=W+'px'; canvas.style.height=H+'px';
ctx.scale(devicePixelRatio,devicePixelRatio);

let tx=0,ty=0,scale=1;

const nodes=graphData.nodes.map(d=>({...d}));
const links=graphData.links.map(d=>({...d}));
const nodeMap=new Map(nodes.map(n=>[n.id,n]));
const S=0.40;
const lSrcIds=new Array(links.length);
const lTgtIds=new Array(links.length);
const lStr=new Float32Array(links.map(l=>l.strength||0.5));
const adjIndex=new Map();
for(const n of nodes) adjIndex.set(n.id,new Set([n.id]));

const sim=d3.forceSimulation(nodes)
  .force("link",d3.forceLink(links).id(d=>d.id).distance(d=>55/(d.strength||0.5)).strength(d=>(d.strength||0.5)*0.7))
  .force("charge",d3.forceManyBody().strength(d=>-(d.radius*S)*14).distanceMax(500))
  .force("center",d3.forceCenter(W/2,H/2))
  .force("collision",d3.forceCollide().radius(d=>(d.radius*S)+16).strength(1.0).iterations(4))
  .force("x",d3.forceX(W/2).strength(0.06))
  .force("y",d3.forceY(H/2).strength(0.06))
  .velocityDecay(0.4).alphaDecay(0.012).stop();

for(const d of nodes){d.x=W/2+(Math.random()-0.5)*W*0.7;d.y=H/2+(Math.random()-0.5)*H*0.7;}
 /* Pin Epstein to center during initial settle */
const epInit=nodeMap.get("epstein");
if(epInit){epInit.x=W/2;epInit.y=H/2;epInit.fx=W/2;epInit.fy=H/2;}
sim.alpha(1);
for(let i=0;i<1000;i++) sim.tick();
/* Save Epstein's pinned position */
if(epInit){epInit._ox=W/2;epInit._oy=H/2;}

for(let i=0;i<links.length;i++){
  const l=links[i],s=l.source.id||l.source,t=l.target.id||l.target;
  adjIndex.get(s)?.add(t); adjIndex.get(t)?.add(s);
  lSrcIds[i]=s; lTgtIds[i]=t;
}
nodes.forEach(d=>{d._ox=d.x;d._oy=d.y;});

let activeCat="all",_visCache=null,visSet=new Set(),hoveredNode=null,searchQuery="",showLabels=true,minStrength=0,showOrphans=true;
const nodeOpacity=new Float32Array(nodes.length).fill(0);
const nodeLabelLC=nodes.map(n=>n.label.toLowerCase());

function invalidateVis(){_visCache=null;}
function getVisibleSet(){
  if(_visCache) return _visCache;
  const at=new Set();
  document.querySelectorAll(".tf").forEach(el=>{if(el.checked)at.add(el.value);});
  const catSet=activeCat!=="all"?new Set(categories[activeCat]||[]):null;
  let linkedSet=null;
  if(!showOrphans){
    linkedSet=new Set();
    for(let i=0;i<links.length;i++) if(lStr[i]>=minStrength){linkedSet.add(lSrcIds[i]);linkedSet.add(lTgtIds[i]);}
  }
  const vis=new Set();
  for(const d of nodes){
    if(!at.has(d.type)) continue;
    if(catSet&&!catSet.has(d.id)) continue;
    if(linkedSet&&!linkedSet.has(d.id)) continue;
    vis.add(d.id);
  }
  _visCache=vis; return vis;
}

function get2nd(id){
  const f=adjIndex.get(id); if(!f) return new Set();
  const s=new Set(f);
  for(const fid of f){const f2=adjIndex.get(fid);if(f2)for(const sid of f2)s.add(sid);}
  return s;
}

let rafId=null;
function nodeColor(d){
  if(forceBlue.has(d.id)) return "#60a5fa";
  if(confirmedSet.has(d.id)) return "#ef4444";
  return C[d.type]||"#64748b";
}

function draw(){
  rafId=null;
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  ctx.clearRect(0,0,W,H);
  ctx.save();
  ctx.translate(tx,ty);
  ctx.scale(scale,scale);

  const conn=hoveredNode?(adjIndex.get(hoveredNode.id)||new Set()):null;
  const conn2=hoveredNode?get2nd(hoveredNode.id):null;
  const showWeak=scale>=0.5,showMed=scale>=0.3;
  const minR4lbl=scale<0.3?22:scale<0.5?15:scale<0.8?10:0;

  /* links */
  for(let i=0;i<links.length;i++){
    const l=links[i],s=l.source,t=l.target,sid=s.id||s,tid=t.id||t;
    if(!visSet.has(sid)||!visSet.has(tid)) continue;
    if(lStr[i]<minStrength) continue;
    const str=lStr[i];
    if(!showWeak&&str<0.4) continue;
    if(!showMed&&str<0.6) continue;
    let alpha,lineW;
    if(conn){
      if(sid===hoveredNode.id||tid===hoveredNode.id){alpha=0.5+str*0.4;lineW=Math.max(1,str*2.5);}
      else continue;
    } else {
      alpha=str>=0.8?0.22:str>=0.6?0.12:str>=0.4?0.06:0.03;
      lineW=Math.max(0.3,str*1.0);
    }
    const mx=(s.x+t.x)/2,my=(s.y+t.y)/2,dx=t.x-s.x,dy=t.y-s.y,len=Math.sqrt(dx*dx+dy*dy)||1;
    const cv=((i%7)-3)*0.05*len/5,cpx=mx+(-dy/len)*cv,cpy=my+(dx/len)*cv;
    ctx.beginPath(); ctx.moveTo(s.x,s.y);
    if(Math.abs(cv)>2) ctx.quadraticCurveTo(cpx,cpy,t.x,t.y); else ctx.lineTo(t.x,t.y);
    ctx.lineWidth=lineW;
    ctx.strokeStyle=str>=0.8?`rgba(239,68,68,${alpha})`:str>=0.6?`rgba(251,146,60,${alpha})`:str>=0.4?`rgba(100,116,139,${alpha})`:`rgba(71,85,105,${alpha})`;
    ctx.stroke();
  }

  /* nodes */
  for(let i=0;i<nodes.length;i++){
    const d=nodes[i]; if(!visSet.has(d.id)) continue;
    const op=nodeOpacity[i]; if(op<=0.01) continue;
    const r=d.radius*S,color=nodeColor(d);
    let fop;
    if(conn){
      if(d.id===hoveredNode.id) fop=op;
      else if(conn.has(d.id)) fop=op*0.95;
      else if(conn2&&conn2.has(d.id)) fop=op*0.25;
      else fop=op*0.06;
    } else {
      fop=(searchQuery&&!nodeLabelLC[i].includes(searchQuery))?op*0.1:op;
    }
    ctx.globalAlpha=fop;
    if(hoveredNode&&d.id===hoveredNode.id){ctx.shadowColor=color;ctx.shadowBlur=20;}
    const dr=(conn&&conn.has(d.id)&&d.id!==hoveredNode?.id)?r*1.08:r;
    ctx.beginPath(); ctx.arc(d.x,d.y,dr,0,Math.PI*2);
    ctx.fillStyle=color; ctx.fill();
    ctx.shadowColor="transparent"; ctx.shadowBlur=0;
    ctx.strokeStyle=forceBlue.has(d.id)?"rgba(96,165,250,0.4)":confirmedSet.has(d.id)?"rgba(239,68,68,0.4)":"rgba(255,255,255,0.12)";
    ctx.lineWidth=1.2; ctx.stroke();
  }
  ctx.globalAlpha=1;

  /* labels — reads _lx/_ly offsets written by placeLabels() */
  if(showLabels){
    const fs=Math.max(6,Math.min(9,7/Math.sqrt(Math.max(0.3,scale))));
    ctx.font=`500 ${fs}px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif`;
    ctx.textAlign="center"; ctx.textBaseline="top";
    for(let i=0;i<nodes.length;i++){
      const d=nodes[i]; if(!visSet.has(d.id)) continue;
      const op=nodeOpacity[i]; if(op<=0.01) continue;
      if(d.radius<minR4lbl&&!(conn&&conn.has(d.id))) continue;
      let lop;
      if(conn){
        if(d.id===hoveredNode.id) lop=1;
        else if(conn.has(d.id)) lop=0.9;
        else if(conn2&&conn2.has(d.id)) lop=0.15;
        else lop=0;
      } else {
        lop=(searchQuery&&!nodeLabelLC[i].includes(searchQuery))?0.05:0.85;
      }
      if(lop<=0.01) continue;
      ctx.globalAlpha=op*lop;
      const nodeR=d.radius*S;
      ctx.fillStyle=forceBlue.has(d.id)?"#93c5fd":confirmedSet.has(d.id)?"#fca5a5":"#94a3b8";
      ctx.fillText(d.label,d.x,d.y+nodeR+3);
    }
  }
  ctx.globalAlpha=1;
  ctx.restore();

  /* minimap */
  {
    const mw=130,mh=85,mp=8,mmx=W-mw-mp,mmy=H-mh-mp;
    let bx0=Infinity,by0=Infinity,bx1=-Infinity,by1=-Infinity,cnt=0;
    for(const d of nodes){
      if(!visSet.has(d.id)) continue;
      if(d.x<bx0)bx0=d.x;if(d.y<by0)by0=d.y;if(d.x>bx1)bx1=d.x;if(d.y>by1)by1=d.y;cnt++;
    }
    if(cnt>2&&bx1>bx0){
      const p=10,ms=Math.min((mw-p*2)/(bx1-bx0||1),(mh-p*2)/(by1-by0||1));
      const ox=mmx+mw/2-(bx0+bx1)/2*ms,oy=mmy+mh/2-(by0+by1)/2*ms;
      ctx.fillStyle="rgba(15,23,42,0.8)"; ctx.fillRect(mmx,mmy,mw,mh);
      ctx.strokeStyle="rgba(51,65,85,0.4)"; ctx.lineWidth=1; ctx.strokeRect(mmx,mmy,mw,mh);
      for(const d of nodes){
        if(!visSet.has(d.id)) continue;
        const px=ox+d.x*ms,py=oy+d.y*ms;
        if(px<mmx||px>mmx+mw||py<mmy||py>mmy+mh) continue;
        ctx.beginPath(); ctx.arc(px,py,1.2,0,Math.PI*2);
        ctx.fillStyle=nodeColor(d); ctx.globalAlpha=0.5; ctx.fill();
      }
      ctx.globalAlpha=1;
      ctx.strokeStyle="rgba(99,102,241,0.4)"; ctx.lineWidth=1;
      ctx.strokeRect(Math.max(mmx,ox+(-tx/scale)*ms),Math.max(mmy,oy+(-ty/scale)*ms),Math.min((W/scale)*ms,mw),Math.min((H/scale)*ms,mh));
    }
  }
}

function scheduleRedraw(){if(!rafId)rafId=requestAnimationFrame(draw);}

const opTgt=new Float32Array(nodes.length).fill(0);
let animating=false;
function tickOpacity(){
  let moving=false;
  for(let i=0;i<nodes.length;i++){
    const d=opTgt[i]-nodeOpacity[i];
    if(Math.abs(d)>0.01){nodeOpacity[i]+=d*0.12;moving=true;}
    else nodeOpacity[i]=opTgt[i];
  }
  draw();
  if(moving) requestAnimationFrame(tickOpacity);
  else animating=false;
}
function setOpTgt(){
  for(let i=0;i<nodes.length;i++) opTgt[i]=visSet.has(nodes[i].id)?0.9:0;
  if(!animating){animating=true;requestAnimationFrame(tickOpacity);}
}

let simRunning=false,refitTimer=null;
function restoreForces(){
  sim.force("center",d3.forceCenter(W/2,H/2))
     .force("x",d3.forceX(W/2).strength(0.06))
     .force("y",d3.forceY(H/2).strength(0.06))
     .force("charge",d3.forceManyBody().strength(d=>-(d.radius*S)*14).distanceMax(500))
     .force("collision",d3.forceCollide().radius(d=>(d.radius*S)+16).strength(1.0).iterations(4));
}
function stopSim(){
  if(refitTimer){clearTimeout(refitTimer);refitTimer=null;}
  sim.stop();simRunning=false;sim.on("tick.r",null).on("end.r",null);
}

function resolveOverlaps(){
  /* Run collision-only passes on current positions */
  const colForce=d3.forceCollide().radius(d=>visSet.has(d.id)?(d.radius*S)+16:0).strength(1.0).iterations(6);
  colForce.initialize(nodes,()=>1);
  for(let i=0;i<80;i++) colForce(0.3);
  for(const d of nodes){d._ox=d.x;d._oy=d.y;d.fx=d.x;d.fy=d.y;}
}

function refitVis(){
  if(refitTimer) clearTimeout(refitTimer);
  refitTimer=setTimeout(()=>{
    const vis=getVisibleSet(); if(!vis.size) return;
    stopSim();
    /* Unpin all */
    for(const d of nodes){d.fx=null;d.fy=null;}
    /* Keep Epstein pinned to center in All view */
    if(activeCat==="all"){
      const ep=nodeMap.get("epstein");
      if(ep){ep.fx=W/2;ep.fy=H/2;ep.x=W/2;ep.y=H/2;}
    }
    const cx=W/2,cy=H/2,vc=vis.size;
    const cm=vc<15?22:vc<40?16:12;
    const cs=vc<15?0.35:vc<40?0.22:0.14;
    sim.force("center",d3.forceCenter(cx,cy).strength(1))
       .force("x",d3.forceX(cx).strength(d=>vis.has(d.id)?cs:0))
       .force("y",d3.forceY(cy).strength(d=>vis.has(d.id)?cs:0))
       .force("charge",d3.forceManyBody().strength(d=>vis.has(d.id)?-(d.radius*S)*cm:0).distanceMax(500))
       .force("collision",d3.forceCollide().radius(d=>vis.has(d.id)?(d.radius*S)+16:0).strength(1.0).iterations(4));
    sim.on("tick.r",()=>{
      for(const d of nodes)if(vis.has(d.id)){d._ox=d.x;d._oy=d.y;}
      scheduleRedraw();
    });
    sim.on("end.r",()=>{
      simRunning=false;sim.on("tick.r",null).on("end.r",null);sim.stop();
      for(const d of nodes){d.fx=d.x;d.fy=d.y;d._ox=d.x;d._oy=d.y;}
      /* Ensure Epstein stays dead center in All view */
      if(activeCat==="all"){
        const ep=nodeMap.get("epstein");
        if(ep){ep.fx=W/2;ep.fy=W/2;ep.x=W/2;ep.y=H/2;ep._ox=W/2;ep._oy=H/2;}
      }
      restoreForces();scheduleRedraw();
    });
    simRunning=true;sim.alpha(0.8).alphaDecay(0.022).alphaTarget(0).restart();
  },80);
}

function applyFilters(){invalidateVis();visSet=getVisibleSet();setOpTgt();updateStats();}
function updateStats(){
  let vl=0;
  for(let i=0;i<links.length;i++) if(lStr[i]>=minStrength&&visSet.has(lSrcIds[i])&&visSet.has(lTgtIds[i])) vl++;
  document.getElementById("stats").innerHTML=`${visSet.size} of ${nodes.length} nodes · ${vl} of ${links.length} links<br>Scroll to zoom · Drag to pan · Click for dossier`;
}

const tipEl=document.getElementById("tip");
function toGraph(cx,cy){return{x:(cx-tx)/scale,y:(cy-ty)/scale};}
function hitTest(gx,gy){
  for(let i=nodes.length-1;i>=0;i--){
    const d=nodes[i]; if(!visSet.has(d.id)) continue;
    const r=d.radius*S+2,dx=gx-d.x,dy=gy-d.y;
    if(dx*dx+dy*dy<=r*r) return d;
  }
  return null;
}
function showTip(d,cx,cy){
  const cats=Object.entries(categories).filter(([,v])=>v.includes(d.id)).map(([k])=>catNames[k]);
  let h=`<div class="name" style="color:${C[d.type]||'#64748b'}">${d.label}</div>`;
  if(d.role) h+=`<div><span class="lbl">Role: </span>${d.role}</div>`;
  if(d.status) h+=`<div><span class="lbl">Status: </span>${d.status}</div>`;
  if(cats.length) h+=`<div style="margin-top:4px;color:#64748b;font-size:10px">${cats.join(' · ')}</div>`;
  h+=`<div class="hint">Click to open dossier →</div>`;
  tipEl.innerHTML=h; tipEl.style.display="block";
  tipEl.style.transform=`translate3d(${cx+14}px,${cy-10}px,0)`;
}

let isPanning=false,panSX=0,panSY=0,panSTx=0,panSTy=0;
let dragNode=null,dragSX=0,dragSY=0,mdX=0,mdY=0,mdT=0;

canvas.addEventListener("mousedown",e=>{
  if(e.button!==0) return;
  mdX=e.clientX;mdY=e.clientY;mdT=Date.now();
  const g=toGraph(e.clientX,e.clientY),hit=hitTest(g.x,g.y);
  if(hit){dragNode=hit;dragSX=e.clientX;dragSY=e.clientY;hit.fx=hit.x;hit.fy=hit.y;sim.alphaTarget(0.06).restart();}
  else{isPanning=true;panSX=e.clientX;panSY=e.clientY;panSTx=tx;panSTy=ty;}
});
canvas.addEventListener("mousemove",e=>{
  if(dragNode){const g=toGraph(e.clientX,e.clientY);dragNode.fx=dragNode.x=g.x;dragNode.fy=dragNode.y=g.y;scheduleRedraw();return;}
  if(isPanning){tx=panSTx+(e.clientX-panSX);ty=panSTy+(e.clientY-panSY);scheduleRedraw();return;}
  const g=toGraph(e.clientX,e.clientY),hit=hitTest(g.x,g.y);
  if(hit!==hoveredNode){hoveredNode=hit;scheduleRedraw();}
  if(hit){showTip(hit,e.clientX,e.clientY);canvas.style.cursor="pointer";}
  else{tipEl.style.display="none";canvas.style.cursor="default";}
});
canvas.addEventListener("mouseup",e=>{
  if(dragNode){
    const moved=Math.hypot(e.clientX-dragSX,e.clientY-dragSY),elapsed=Date.now()-mdT;
    if(moved<5&&elapsed<300) openDossier(dragNode);
    dragNode._ox=dragNode.x;dragNode._oy=dragNode.y;dragNode.fx=dragNode.x;dragNode.fy=dragNode.y;
    dragNode=null;sim.alphaTarget(0).alpha(0.0001);
    scheduleRedraw();
  }
  if(isPanning){
    isPanning=false;
    if(Math.hypot(e.clientX-mdX,e.clientY-mdY)<5) document.getElementById("dos").classList.remove("open");
  }
});
canvas.addEventListener("mouseleave",()=>{
  if(dragNode){dragNode._ox=dragNode.x;dragNode._oy=dragNode.y;dragNode.fx=dragNode.x;dragNode.fy=dragNode.y;dragNode=null;sim.alphaTarget(0).alpha(0.0001);}
  hoveredNode=null;isPanning=false;tipEl.style.display="none";scheduleRedraw();
});
canvas.addEventListener("wheel",e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.1:0.91,ns=Math.max(0.1,Math.min(8,scale*f));
  tx=e.clientX-(e.clientX-tx)*(ns/scale);ty=e.clientY-(e.clientY-ty)*(ns/scale);scale=ns;scheduleRedraw();
},{passive:false});

let ltd=0,tpx=0,tpy=0;
canvas.addEventListener("touchstart",e=>{
  if(e.touches.length===2) ltd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  else{tpx=e.touches[0].clientX;tpy=e.touches[0].clientY;panSTx=tx;panSTy=ty;}
},{passive:true});
canvas.addEventListener("touchmove",e=>{
  e.preventDefault();
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const f=d/ltd,mx=(e.touches[0].clientX+e.touches[1].clientX)/2,my=(e.touches[0].clientY+e.touches[1].clientY)/2;
    const ns=Math.max(0.1,Math.min(8,scale*f));
    tx=mx-(mx-tx)*(ns/scale);ty=my-(my-ty)*(ns/scale);scale=ns;ltd=d;
  } else {tx=panSTx+(e.touches[0].clientX-tpx);ty=panSTy+(e.touches[0].clientY-tpy);}
  scheduleRedraw();
},{passive:false});

document.getElementById("search").addEventListener("input",e=>{
  searchQuery=e.target.value.toLowerCase();
  if(searchQuery.length>=2){const m=nodes.find(n=>visSet.has(n.id)&&nodeLabelLC[nodes.indexOf(n)].includes(searchQuery));if(m)hoveredNode=m;}
  else hoveredNode=null;
  invalidateVis();visSet=getVisibleSet();scheduleRedraw();
});

function openDossier(d){
  tipEl.style.display="none";
  const color=C[d.type]||"#64748b",light=Clight[d.type]||"rgba(100,116,139,0.1)",border=Cborder[d.type]||"rgba(100,116,139,0.25)";
  document.getElementById("dos-name").textContent=d.label;
  const roEl=document.getElementById("dos-role");roEl.textContent=d.role||"";roEl.style.display=d.role?"block":"none";
  const stEl=document.getElementById("dos-status");
  if(d.status){
    stEl.textContent=d.status;stEl.style.display="inline-block";
    const dead=/DECEASED|DIED/.test(d.status),conv=/CONVICTED/.test(d.status),fled=/FLED/.test(d.status),imm=/IMMUNITY/.test(d.status);
    stEl.style.background=dead?"rgba(100,116,139,0.1)":conv?"rgba(248,113,113,0.1)":fled?"rgba(251,146,60,0.1)":imm?"rgba(250,204,21,0.1)":light;
    stEl.style.color=dead?"#64748b":conv?"#f87171":fled?"#fb923c":imm?"#facc15":color;
    stEl.style.border="1px solid "+(dead?"rgba(100,116,139,0.2)":conv?"rgba(248,113,113,0.2)":fled?"rgba(251,146,60,0.2)":imm?"rgba(250,204,21,0.2)":border);
  } else stEl.style.display="none";
  const nwEl=document.getElementById("dos-nw");nwEl.textContent=d.networth||"";nwEl.style.display=d.networth?"inline-block":"none";
  const body=document.getElementById("dos-body"),parts=[];
  if(categories.uncertain.includes(d.id)&&!categories.named.includes(d.id)) parts.push(`<div class="cal gray" style="margin-bottom:14px">⚠ Documented connection — role uncertain.</div>`);
  if(d.intelRole)   parts.push(`<div class="ds"><h3>Intel Assessment</h3><div class="cal red">${d.intelRole}</div></div>`);
  if(d.epsteinLink) parts.push(`<div class="ds"><h3>Epstein Connection</h3><div class="cal">${d.epsteinLink}</div></div>`);
  if(d.significance)parts.push(`<div class="ds"><h3>Why This Matters</h3><div class="cal blue">${d.significance}</div></div>`);
  if(d.desc)        parts.push(`<div class="ds"><h3>Summary</h3><p>${d.desc}</p></div>`);
  if(d.evidence)    parts.push(`<div class="ds"><h3>Evidence</h3><p>${d.evidence}</p></div>`);
  if(d.link)        parts.push(`<div class="ds"><h3>Analyst Note</h3><p style="color:#64748b;font-style:italic">${d.link}</p></div>`);
  const nodeCats=Object.entries(categories).filter(([,v])=>v.includes(d.id)).map(([k])=>k);
  if(nodeCats.length) parts.push(`<div class="ds"><h3>Network Role</h3><div>${nodeCats.map(c=>`<span class="ctag">${catNames[c]}</span>`).join("")}</div></div>`);
  const txt=[(d.desc||""),(d.evidence||""),(d.epsteinLink||""),(d.intelRole||"")].join(" ");
  const ym=[...new Set((txt.match(/\b(19[6-9]\d|20[0-3]\d)\b/g)||[]))].map(Number).sort((a,b)=>a-b);
  parts.push(`<div class="ds"><h3>Profile</h3>
    <div class="df"><div class="fl">ID</div><div class="fv" style="font-family:monospace;color:${color}">${d.id.toUpperCase()}</div></div>
    <div class="df"><div class="fl">Classification</div><div class="fv">${typeLabel[d.type]||d.type}</div></div>
    ${d.networth?`<div class="df"><div class="fl">Net Worth</div><div class="fv">${d.networth}</div></div>`:""}
    ${ym.length>=2?`<div class="df"><div class="fl">Years</div><div class="fv">${ym[0]}–${ym[ym.length-1]}</div></div>`:""}</div>`);
  const conns=[];
  for(const l of links){
    const sid=l.source.id||l.source,tid=l.target.id||l.target;
    if(sid===d.id){const t=nodeMap.get(tid);if(t)conns.push({node:t,strength:l.strength||0.5,dir:"→"});}
    if(tid===d.id){const s=nodeMap.get(sid);if(s)conns.push({node:s,strength:l.strength||0.5,dir:"←"});}
  }
  conns.sort((a,b)=>b.strength-a.strength);
  parts.push(`<div class="ds"><h3>Connections (${conns.length})</h3><ul class="cl">${conns.map(c=>{
    const sc=c.strength>=0.7?"sh":c.strength>=0.4?"sm":"sl";
    return `<li data-id="${c.node.id}"><span class="cn"><span style="color:${C[c.node.type]||'#64748b'}">●</span> ${c.dir} ${c.node.label}</span><span class="cs ${sc}">${Math.round(c.strength*100)}%</span></li>`;
  }).join("")}</ul></div>`);
  const tl=d.type==="center"?"CRITICAL":d.type==="convicted"?"HIGH":coreSet.has(d.id)?"HIGH":conns.length>10?"ELEVATED":conns.length>5?"MODERATE":"LOW";
  const tC={CRITICAL:"#f87171",HIGH:"#fb923c",ELEVATED:"#fbbf24",MODERATE:"#818cf8",LOW:"#475569"};
  const tB={CRITICAL:"rgba(248,113,113,0.1)",HIGH:"rgba(251,146,60,0.1)",ELEVATED:"rgba(251,191,36,0.1)",MODERATE:"rgba(129,140,248,0.1)",LOW:"rgba(71,85,105,0.1)"};
  parts.push(`<div class="ds"><h3>Assessment</h3><span class="tb" style="background:${tB[tl]};color:${tC[tl]};border:1px solid ${tC[tl]}30">${tl}</span><div style="margin-top:7px;color:#475569;font-size:11px">${conns.length} connections · weight: ${d.radius}</div></div>`);
  body.innerHTML=parts.join("");
  body.querySelector(".cl")?.addEventListener("click",e=>{
    const li=e.target.closest("li[data-id]");if(!li) return;
    const t=nodeMap.get(li.dataset.id);if(t)openDossier(t);
  });
  document.getElementById("dos").classList.add("open");
}

document.getElementById("dos-x").addEventListener("click",()=>document.getElementById("dos").classList.remove("open"));
document.getElementById("labels").addEventListener("change",e=>{showLabels=e.target.checked;scheduleRedraw();});
document.getElementById("orphans").addEventListener("change",e=>{showOrphans=e.target.checked;applyFilters();});
document.getElementById("str").addEventListener("input",e=>{minStrength=+e.target.value;document.getElementById("sv").textContent=minStrength.toFixed(1);applyFilters();});
document.querySelectorAll(".tf").forEach(cb=>cb.addEventListener("change",()=>applyFilters()));
document.querySelectorAll("#cat-buttons .cat-btn").forEach(btn=>btn.addEventListener("click",()=>{
  document.querySelectorAll("#cat-buttons .cat-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active"); activeCat=btn.dataset.cat;
  stopSim();
  /* Always unpin and re-run sim so collisions resolve */
  for(const d of nodes){d.fx=null;d.fy=null;d.x=d._ox;d.y=d._oy;}
  /* Pin Epstein to center when viewing All */
  if(activeCat==="all"){
    const ep=nodeMap.get("epstein");
    if(ep){ep.x=W/2;ep.y=H/2;ep.fx=W/2;ep.fy=H/2;ep._ox=W/2;ep._oy=H/2;}
  }
  applyFilters();
  refitVis();
}));

document.querySelectorAll(".tf").forEach(el=>{if(el.value==="possibly")el.checked=false;});
applyFilters();
resolveOverlaps();

{
  const vn=nodes.filter(d=>visSet.has(d.id));
  if(vn.length){
    let x0=Infinity,y0=Infinity,x1=-Infinity,y1=-Infinity;
    for(const d of vn){const r=d.radius*S;if(d.x-r<x0)x0=d.x-r;if(d.y-r<y0)y0=d.y-r;if(d.x+r>x1)x1=d.x+r;if(d.y+r>y1)y1=d.y+r;}
    const bw=x1-x0+200,bh=y1-y0+200;
    scale=Math.min(W/bw,H/bh,2);tx=W/2-(x0+x1)/2*scale;ty=H/2-(y0+y1)/2*scale;
  }
}
draw();
</script>
