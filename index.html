#search{

.dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:8px;vertical-align:middle}
#controls input[type="range"]{width:100%;accent-color:#6366f1}
#controls input[type="checkbox"]{accent-color:#6366f1}
#stats{font-size:11px;color:#475569;margin-top:12px;border-top:1px solid #334155;padding-top:10px;line-height:1.6}
.cat-buttons{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.cat-btn{

#tooltip .hint{margin-top:8px;color:#475569;font-size:10px;font-style:italic}

  convicted:  "#2dd4bf",
  suspicious: "#60a5fa",
  possibly:   "#a78bfa"
};
const Clight = {
  center:     "rgba(248,113,113,0.1)",
  convicted:  "rgba(45,212,191,0.1)",
  suspicious: "rgba(96,165,250,0.1)",
  possibly:   "rgba(167,139,250,0.1)"
};
const Cborder = {
  center:     "rgba(248,113,113,0.25)",
  convicted:  "rgba(45,212,191,0.25)",
  suspicious: "rgba(96,165,250,0.25)",
  possibly:   "rgba(167,139,250,0.25)"
};
const typeLabel = {
  center:    "PRINCIPAL TARGET",
  convicted: "CONVICTED",
  suspicious:"SUSPICIOUS - UNDER REVIEW",
  possibly:  "POSSIBLY INVOLVED"
};

const W = window.innerWidth, H = window.innerHeight;
const svg = d3.select("#graph").attr("width",W).attr("height",H);
const g = svg.append("g");
svg.call(d3.zoom().scaleExtent([0.1,8]).on("zoom", e => g.attr("transform",e.transform)));

const nodes = graphData.nodes.map(d => ({...d}));
const links = graphData.links.map(d => ({...d}));

const S = 0.55;

const sim = d3.forceSimulation(nodes)
  .force("link", d3.forceLink(links).id(d=>d.id).distance(d=>100/(d.strength||0.5)).strength(d=>d.strength||0.5))
  .force("charge", d3.forceManyBody().strength(d=>-(d.radius*S)*18))
  .force("center", d3.forceCenter(W/2,H/2))
  .force("collision", d3.forceCollide().radius(d=>(d.radius*S)+4))
  .force("x", d3.forceX(W/2).strength(0.02))
  .force("y", d3.forceY(H/2).strength(0.02))
  .stop();

for (let i=0;i<300;i++) sim.tick();
sim.stop();

function resolveLabels() {
  const len=nodes.length;
  const offY=new Float32Array(len), lblW=new Float32Array(len);
  const lblH=12;
  for(let i=0;i<len;i++){ offY[i]=(nodes[i].radius*S)+14; lblW[i]=nodes[i].label.length*6; }
  for(let pass=0;pass<12;pass++){
    let moved=false;
    for(let i=0;i<len;i++){
      const ax=nodes[i].x-lblW[i]/2, ay=nodes[i].y+offY[i]-lblH/2;
      const ar=ax+lblW[i], ab=ay+lblH;
      let blocked=false;
      for(let j=0;j<len;j++){
        if(i===j) continue;
        const r=nodes[j].radius*S+3, cx=nodes[j].x, cy=nodes[j].y;
        const clx=ax>cx?ax:ar<cx?ar:cx, cly=ay>cy?ay:ab<cy?ab:cy;
        const dx=cx-clx, dy=cy-cly;
        if(dx*dx+dy*dy<r*r){blocked=true;break;}
        const bx=nodes[j].x-lblW[j]/2, by=nodes[j].y+offY[j]-lblH/2;
        if(!(ar<bx||bx+lblW[j]<ax||ab<by||by+lblH<ay)){blocked=true;break;}
      }
      if(blocked){offY[i]+=10;moved=true;}
    }
    if(!moved) break;
  }
  for(let i=0;i<len;i++) nodes[i]._labelOffY=offY[i];
}
resolveLabels();

let linkEl = g.append("g").attr("class","links").selectAll("line").data(links).join("line")
  .attr("stroke", d=>{
    const s=d.strength||0.5;
    return s>=0.8?"rgba(248,113,113,0.5)":s>=0.6?"rgba(251,146,60,0.4)":s>=0.4?"rgba(100,116,139,0.25)":"rgba(100,116,139,0.12)";
  })
  .attr("stroke-width", d=>Math.max(0.5,(d.strength||0.5)*2.5))
  .attr("stroke-opacity",0.6);

const nodeEl = g.append("g").selectAll("g").data(nodes).join("g");

nodeEl.filter(d=>d.type==="center").append("circle")
  .attr("class","pulse-ring")
  .attr("r",d=>(d.radius*S)+6)
  .attr("fill","none")
  .attr("stroke",d=>C[d.type])
  .attr("stroke-width",1.5);

nodeEl.append("circle")
  .attr("r",d=>d.radius*S)
  .attr("fill",d=>C[d.type]||"#64748b")
  .attr("stroke","rgba(255,255,255,0.15)")
  .attr("stroke-width",1.5)
  .attr("opacity",0.9)
  .style("cursor","pointer")
  .attr("filter","drop-shadow(0 2px 4px rgba(0,0,0,0.3))");

let lblEl = g.append("g").selectAll("text").data(nodes).join("text")
  .attr("class","node-label")
  .attr("dy",d=>(d.radius*S)+12)
  .text(d=>d.label);

function updatePositions(){
  linkEl.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
  nodeEl.attr("transform",d=>`translate(${d.x},${d.y})`);
  lblEl.attr("x",d=>d.x).attr("y",d=>d.y);
}
updatePositions();

nodeEl.call(d3.drag()
  .on("start",(e,d)=>{ sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
  .on("drag",(e,d)=>{ d.fx=e.x; d.fy=e.y; updatePositions(); })
  .on("end",(e,d)=>{ sim.alphaTarget(0).stop(); d.fx=null; d.fy=null; }));

const tip = d3.select("#tooltip");

nodeEl.on("mouseover",function(ev,d){
  const conn=new Set([d.id]);
  links.forEach(l=>{
    const s=l.source.id||l.source, t=l.target.id||l.target;
    if(s===d.id) conn.add(t);
    if(t===d.id) conn.add(s);
  });
  nodeEl.select("circle:last-of-type").attr("opacity",n=>conn.has(n.id)?0.9:0.12);
  lblEl.attr("opacity",n=>conn.has(n.id)?1:0.08);
  linkEl.attr("stroke-opacity",l=>{
    const s=l.source.id||l.source,t=l.target.id||l.target;
    return(s===d.id||t===d.id)?0.9:0.03;
  });
  const nodeCats=Object.entries(categories).filter(([k,v])=>v.includes(d.id)).map(([k])=>catNames[k]);
  let h=`<div class="name" style="color:${C[d.type]||'#64748b'}">${d.label}</div>`;
  if(d.agency) h+=`<div style="font-size:10px;color:#64748b;margin-bottom:4px">${d.agency}</div>`;
  if(d.role)   h+=`<div><span class="lbl">Role: </span>${d.role}</div>`;
  if(d.status) h+=`<div><span class="lbl">Status: </span>${d.status}</div>`;
  if(nodeCats.length) h+=`<div style="margin-top:5px;color:#64748b;font-size:10px">${nodeCats.join(' · ')}</div>`;
  h+=`<div class="hint">Click to open dossier →</div>`;
  tip.html(h).style("display","block").style("left",(ev.pageX+15)+"px").style("top",(ev.pageY-10)+"px");
})
.on("mousemove",function(ev){
  tip.style("left",(ev.pageX+15)+"px").style("top",(ev.pageY-10)+"px");
})
.on("mouseout",function(){
  nodeEl.select("circle:last-of-type").attr("opacity",0.9);
  lblEl.attr("opacity",1);
  linkEl.attr("stroke-opacity",0.6);
  tip.style("display","none");
});

function openDossier(d) {
  tip.style("display","none");
  const color  = C[d.type]||"#64748b";
  const light  = Clight[d.type]||"rgba(100,116,139,0.1)";
  const border = Cborder[d.type]||"rgba(100,116,139,0.25)";
  const isCore = coreSet.has(d.id);

  document.getElementById("dossier-name").textContent=d.label;
  document.getElementById("dossier-agency").textContent=d.agency||"";
  document.getElementById("dossier-agency").style.display=d.agency?"block":"none";
  document.getElementById("dossier-role").textContent=d.role||"";
  document.getElementById("dossier-role").style.display=d.role?"block":"none";

  const statusEl=document.getElementById("dossier-status");
  if(d.status){
    statusEl.textContent=d.status; statusEl.style.display="inline-block";
    const isDead=(d.status||"").includes("DECEASED")||(d.status||"").includes("DIED");
    const isConv=(d.status||"").includes("CONVICTED");
    const isFled=(d.status||"").includes("FLED");
    const isImm=(d.status||"").includes("IMMUNITY");
    statusEl.style.background=isDead?"rgba(100,116,139,0.1)":isConv?"rgba(248,113,113,0.1)":isFled?"rgba(251,146,60,0.1)":isImm?"rgba(250,204,21,0.1)":light;
    statusEl.style.color=isDead?"#64748b":isConv?"#f87171":isFled?"#fb923c":isImm?"#facc15":color;
    statusEl.style.border="1px solid "+(isDead?"rgba(100,116,139,0.2)":isConv?"rgba(248,113,113,0.2)":isFled?"rgba(251,146,60,0.2)":isImm?"rgba(250,204,21,0.2)":border);
  } else { statusEl.style.display="none"; }

  const nwEl=document.getElementById("dossier-networth");
  if(d.networth){ nwEl.textContent=d.networth; nwEl.style.display="inline-block"; }
  else { nwEl.style.display="none"; }

  const stamps={center:"TARGET",convicted:"CONVICTED",suspicious:"SUSPECT",possibly:"MONITOR"};
  document.getElementById("dossier-stamp").textContent=stamps[d.type]||"FILE";

  const body=document.getElementById("dossier-body");
  let html="";

  if(isCore) html+=`<div style="margin-bottom:16px"><span class="core-badge">⬤ OPERATIONAL RING</span></div>`;

  const isUncertain = categories.uncertain.includes(d.id) && !categories.named.includes(d.id);
  if(isUncertain){
    html+=`<div class="dossier-callout gray" style="margin-bottom:16px">
      ⚠ Documented connection — role uncertain. Not named under oath. May be a client, a leverage target, or a social contact. This file reflects documented contact, not proven participation.
    </div>`;
  }

  if(d.intelRole)    html+=`<div class="dossier-section"><h3>Intelligence Assessment</h3><div class="dossier-callout red">${d.intelRole}</div></div>`;
  if(d.epsteinLink)  html+=`<div class="dossier-section"><h3>Epstein Connection</h3><div class="dossier-callout">${d.epsteinLink}</div></div>`;
  if(d.significance) html+=`<div class="dossier-section"><h3>Why This Matters</h3><div class="dossier-callout blue">${d.significance}</div></div>`;
  if(d.desc)         html+=`<div class="dossier-section"><h3>Summary</h3><p>${d.desc}</p></div>`;
  if(d.evidence)     html+=`<div class="dossier-section"><h3>Evidence</h3><p>${d.evidence}</p></div>`;
  if(d.link)         html+=`<div class="dossier-section"><h3>Analyst Note</h3><p style="color:#64748b;font-style:italic">${d.link}</p></div>`;

  const nodeCats=Object.entries(categories).filter(([k,v])=>v.includes(d.id)).map(([k])=>k);
  if(nodeCats.length){
    html+=`<div class="dossier-section"><h3>Network Role</h3><div style="display:flex;gap:4px;flex-wrap:wrap">`;
    nodeCats.forEach(c=>{
      html+=`<span class="cat-tag" style="background:${catColors[c]}">${catNames[c]}</span>`;
    });
    html+=`</div></div>`;
  }

  html+=`<div class="dossier-section"><h3>Profile</h3>`;
  html+=`<div class="dossier-field"><div class="fl">Subject ID</div><div class="fv" style="font-family:ui-monospace,monospace;color:${color}">${d.id.toUpperCase()}</div></div>`;
  html+=`<div class="dossier-field"><div class="fl">Classification</div><div class="fv">${typeLabel[d.type]||d.type}</div></div>`;
  if(d.networth) html+=`<div class="dossier-field"><div class="fl">Net Worth</div><div class="fv">${d.networth}</div></div>`;
  if(d.birthday_book) html+=`<div class="dossier-field"><div class="fl">Birthday Book</div><div class="fv" style="color:#f87171">✓ Signed Epstein's birthday book</div></div>`;
  html+=`</div>`;

  const conns=[];
  links.forEach(l=>{
    const sid=l.source.id||l.source, tid=l.target.id||l.target;
    if(sid===d.id){ const t=nodes.find(n=>n.id===tid); if(t) conns.push({node:t,strength:l.strength||0.5,direction:"→"}); }
    if(tid===d.id){ const s=nodes.find(n=>n.id===sid); if(s) conns.push({node:s,strength:l.strength||0.5,direction:"←"}); }
  });
  conns.sort((a,b)=>b.strength-a.strength);

  html+=`<div class="dossier-section"><h3>Connections (${conns.length})</h3><ul class="conn-list">`;
  conns.forEach(c=>{
    const sc=c.strength>=0.7?"str-high":c.strength>=0.4?"str-med":"str-low";
    const pct=Math.round(c.strength*100);
    const opTag=coreSet.has(c.node.id)?` <span style="color:#f87171;font-size:8px">●</span>`:"";
    html+=`<li data-id="${c.node.id}">
      <span class="conn-name"><span style="color:${C[c.node.type]||'#64748b'}">●</span> ${c.direction} ${c.node.label}${opTag}</span>
      <span class="conn-strength ${sc}">${pct}%</span>
    </li>`;
  });
  html+=`</ul></div>`;

  const threatLevel=d.type==="center"?"CRITICAL":d.type==="convicted"?"HIGH":isCore?"HIGH":conns.length>10?"ELEVATED":conns.length>5?"MODERATE":"LOW";
  const tC={CRITICAL:"#f87171",HIGH:"#fb923c",ELEVATED:"#fbbf24",MODERATE:"#818cf8",LOW:"#475569"};
  const tB={CRITICAL:"rgba(248,113,113,0.1)",HIGH:"rgba(251,146,60,0.1)",ELEVATED:"rgba(251,191,36,0.1)",MODERATE:"rgba(129,140,248,0.1)",LOW:"rgba(71,85,105,0.1)"};
  html+=`<div class="dossier-section"><h3>Assessment</h3>
    <span class="threat-badge" style="background:${tB[threatLevel]};color:${tC[threatLevel]};border:1px solid ${tC[threatLevel]}30">${threatLevel}</span>
    <div style="margin-top:8px;color:#475569;font-size:11px">${conns.length} direct connections · Network weight: ${d.radius}</div>
  </div>`;

  html+=`<div style="margin-top:24px;padding-top:12px;border-top:1px solid #334155;color:#334155;font-size:9px;text-align:center;letter-spacing:0.5px">
    FILE REF: EP-NET-${d.id.toUpperCase()} · CLASSIFICATION: RESTRICTED
  </div>`;

  body.innerHTML=html;
  body.querySelectorAll(".conn-list li").forEach(li=>{
    li.addEventListener("click",()=>{
      const t=nodes.find(n=>n.id===li.dataset.id);
      if(t){ body.scrollTop=0; openDossier(t); }
    });
  });

  document.getElementById("dossier").classList.add("open");
  document.getElementById("dossier").scrollTop=0;
}

nodeEl.on("click",function(ev,d){ ev.stopPropagation(); openDossier(d); });
document.getElementById("dossier-close").addEventListener("click",()=>document.getElementById("dossier").classList.remove("open"));
svg.on("click",()=>document.getElementById("dossier").classList.remove("open"));

let activeCat = "all";

function refitVisibleNodes(){
  const visibleIds = new Set(nodes.filter(n => isNodeVisible(n)).map(n => n.id));
  if(visibleIds.size === 0) return;
  const panelW = 284 + 32;
  const cx = panelW + (W - panelW) / 2;
  const cy = H / 2;
  sim
    .force("center", d3.forceCenter(cx, cy).strength(1))
    .force("x", d3.forceX().x(d => visibleIds.has(d.id) ? cx : d.x).strength(d => visibleIds.has(d.id) ? 0.15 : 0))
    .force("y", d3.forceY().y(d => visibleIds.has(d.id) ? cy : d.y).strength(d => visibleIds.has(d.id) ? 0.15 : 0))
    .force("charge", d3.forceManyBody().strength(d => visibleIds.has(d.id) ? -(d.radius*S)*22 : 0))
    .force("collision", d3.forceCollide().radius(d => visibleIds.has(d.id) ? (d.radius*S)+6 : 0));
  sim.on("tick", updatePositions);
  sim.on("end", () => {
    sim
      .force("center", d3.forceCenter(W/2, H/2))
      .force("x", d3.forceX(W/2).strength(0.02))
      .force("y", d3.forceY(H/2).strength(0.02))
      .force("charge", d3.forceManyBody().strength(d => -(d.radius*S)*18))
      .force("collision", d3.forceCollide().radius(d => (d.radius*S)+4));
    sim.on("tick", null).on("end", null);
  });
  sim.alpha(0.6).alphaDecay(0.028).alphaTarget(0).restart();
}

document.querySelectorAll("#cat-buttons .cat-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll("#cat-buttons .cat-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    activeCat = btn.dataset.cat;
    applyFilters();
    setTimeout(refitVisibleNodes, 50);
  });
});

d3.select("#search").on("input", function(){ applyFilters(); });

function isNodeVisible(d){
  const at = new Set();
  d3.selectAll(".tf").each(function(){ if(this.checked) at.add(this.value); });
  if(!at.has(d.type)) return false;
  if(activeCat !== "all"){
    const catSet = new Set(categories[activeCat]||[]);
    if(!catSet.has(d.id)) return false;
  }
  const so = d3.select("#orphans").property("checked");
  if(!so){
    const ms = +d3.select("#str").property("value");
    const ln = new Set();
    links.forEach(l=>{
      if((l.strength||0.5)>=ms){ ln.add(l.source.id||l.source); ln.add(l.target.id||l.target); }
    });
    if(!ln.has(d.id)) return false;
  }
  return true;
}

let filterTimer;
function applyFilters(){
  clearTimeout(filterTimer);
  filterTimer = setTimeout(applyFiltersNow, 16);
}

function applyFiltersNow(){
  const q = document.getElementById("search").value.toLowerCase();
  const showLabels = d3.select("#labels").property("checked");
  const ms = +d3.select("#str").property("value");
  nodeEl.attr("display", d => isNodeVisible(d) ? null : "none");
  nodeEl.select("circle:last-of-type").attr("opacity", d => {
    if(!isNodeVisible(d)) return 0.12;
    if(q && !d.label.toLowerCase().includes(q)) return 0.12;
    return 0.9;
  });
  lblEl.attr("display", d => (isNodeVisible(d) && showLabels) ? null : "none");
  lblEl.attr("opacity", d => (!q || d.label.toLowerCase().includes(q)) ? 1 : 0.08);
  linkEl.attr("display", d=>{
    if((d.strength||0.5)<ms) return "none";
    const sid=d.source.id||d.source, tid=d.target.id||d.target;
    const sn=nodes.find(n=>n.id===sid), tn=nodes.find(n=>n.id===tid);
    if(!sn||!tn||!isNodeVisible(sn)||!isNodeVisible(tn)) return "none";
    return null;
  });
  let visN=0, visL=0;
  nodes.forEach(n=>{ if(isNodeVisible(n)) visN++; });
  links.forEach(l=>{
    const sid=l.source.id||l.source, tid=l.target.id||l.target;
    const sn=nodes.find(n=>n.id===sid), tn=nodes.find(n=>n.id===tid);
    if(sn&&tn&&isNodeVisible(sn)&&isNodeVisible(tn)&&(l.strength||0.5)>=ms) visL++;
  });
  d3.select("#stats").html(`${visN} of ${nodes.length} nodes · ${visL} of ${links.length} links<br>Scroll to zoom · Drag to move<br>Hover to highlight · Click for dossier`);
}

d3.selectAll(".tf").on("change", ()=>{ applyFilters(); setTimeout(refitVisibleNodes, 50); });
d3.select("#str").on("input", function(){ d3.select("#sv").text(this.value); applyFilters(); });
d3.select("#labels").on("change", applyFilters);
d3.select("#orphans").on("change", applyFilters);
applyFilters();
</script>
</body>
</html>
