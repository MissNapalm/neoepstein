const Cborder={center:"rgba(239,68,68,0.25)",convicted:"rgba(45,212,191,0.25)",suspicious:"rgba(96,165,250,0.25)",possibly:"rgba(167,139,250,0.25)"};
const typeLabel={center:"PRINCIPAL TARGET",convicted:"CONVICTED",suspicious:"SUSPICIOUS - UNDER REVIEW",possibly:"POSSIBLY INVOLVED"};
const coreSet=new Set(categories.operational);
const confirmedSet=new Set(categories.confirmed);
const forceBlue=new Set(["staley","wexner","barr_d","rodriguez","alessi","robert_maxwell"]);

/* ── CANVAS SETUP ── */
const canvas = document.getElementById('graph');
const ctx = canvas.getContext('2d');
const W = window.innerWidth, H = window.innerHeight;
canvas.width = W * devicePixelRatio;
canvas.height = H * devicePixelRatio;
canvas.style.width = W + 'px';
canvas.style.height = H + 'px';
ctx.scale(devicePixelRatio, devicePixelRatio);

/* ── ZOOM / PAN STATE ── */
let tx = 0, ty = 0, scale = 1;

/* ── DATA ── */
const nodes = graphData.nodes.map(d => ({...d}));
const links = graphData.links.map(d => ({...d}));
const nodeMap = new Map(nodes.map(n => [n.id, n]));
const S = 0.40;

/* Pre-cache link data */
const linkSrcIds = new Array(links.length);
const linkTgtIds = new Array(links.length);
const linkStrengths = new Float32Array(links.map(l => l.strength||0.5));

/* Adjacency index */
const adjIndex = new Map();
for (const n of nodes) adjIndex.set(n.id, new Set([n.id]));

/* ── SIMULATION ── */
const sim = d3.forceSimulation(nodes)
  .force("link",      d3.forceLink(links).id(d=>d.id).distance(d=>55/(d.strength||0.5)).strength(d=>(d.strength||0.5)*0.7))
  .force("charge",    d3.forceManyBody().strength(d=>-(d.radius*S)*8).distanceMax(350))
  .force("center",    d3.forceCenter(W/2, H/2))
  .force("collision", d3.forceCollide().radius(d=>(d.radius*S)+3))
  .force("x",         d3.forceX(W/2).strength(0.09))
  .force("y",         d3.forceY(H/2).strength(0.09))
  .velocityDecay(0.4)
  .alphaDecay(0.015)
  .stop();

/* Jitter — wide spread to break symmetry evenly */
for (const d of nodes) {
  d.x = W/2 + (Math.random()-0.5) * W * 0.6;
  d.y = H/2 + (Math.random()-0.5) * H * 0.6;
}

/* Run initial settle synchronously */
sim.alpha(1);
for (let i = 0; i < 600; i++) sim.tick();

/* Build adjacency after forceLink resolves objects */
for (let i = 0; i < links.length; i++) {
  const l = links[i];
  const s = l.source.id||l.source, t = l.target.id||l.target;
  adjIndex.get(s)?.add(t);
  adjIndex.get(t)?.add(s);
  linkSrcIds[i] = s;
  linkTgtIds[i] = t;
}

/* Save settled positions — used to restore after filter changes */
nodes.forEach(d => { d._ox = d.x; d._oy = d.y; });

/* ── FILTER STATE ── */
let activeCat = "all";
let _visCache = null;
let visSet = new Set();
let hoveredNode = null;
let searchQuery = "";
let showLabels = true;
let minStrength = 0;
let showOrphans = true;

/* Node opacity targets for smooth fade */
const nodeOpacity = new Float32Array(nodes.length).fill(0);
const nodeLabelLC = nodes.map(n => n.label.toLowerCase());

function invalidateVis() { _visCache = null; }

function getVisibleSet() {
  if (_visCache) return _visCache;
  const at = new Set();
  document.querySelectorAll(".tf").forEach(el => { if(el.checked) at.add(el.value); });
  const catSet = activeCat !== "all" ? new Set(categories[activeCat]||[]) : null;
  let linkedSet = null;
  if (!showOrphans) {
    linkedSet = new Set();
    for (let i = 0; i < links.length; i++) {
      if (linkStrengths[i] >= minStrength) {
        linkedSet.add(linkSrcIds[i]);
        linkedSet.add(linkTgtIds[i]);
      }
    }
  }
  const vis = new Set();
  for (const d of nodes) {
    if (!at.has(d.type)) continue;
    if (catSet && !catSet.has(d.id)) continue;
    if (linkedSet && !linkedSet.has(d.id)) continue;
    vis.add(d.id);
  }
  _visCache = vis;
  return vis;
}

/* ── 2ND-DEGREE ADJACENCY ── */
function get2ndDegree(nodeId) {
  const first = adjIndex.get(nodeId);
  if (!first) return new Set();
  const second = new Set(first);
  for (const fid of first) {
    const f2 = adjIndex.get(fid);
    if (f2) for (const sid of f2) second.add(sid);
  }
  return second;
}

/* ── DRAW LOOP ── */
let rafId = null;

function nodeColor(d) {
  if (forceBlue.has(d.id)) return "#60a5fa";
  if (confirmedSet.has(d.id)) return "#ef4444";
  return C[d.type] || "#64748b";
}

function draw() {
  rafId = null;

  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  ctx.clearRect(0, 0, W, H);

  ctx.save();
  ctx.translate(tx, ty);
  ctx.scale(scale, scale);

  const conn = hoveredNode ? (adjIndex.get(hoveredNode.id) || new Set()) : null;
  const conn2 = hoveredNode ? get2ndDegree(hoveredNode.id) : null;

  /* Zoom-level detail thresholds */
  const showWeakLinks = scale >= 0.5;
  const showMedLinks = scale >= 0.3;
  const minRadiusForLabel = scale < 0.3 ? 22 :
                             scale < 0.5 ? 15 :
                             scale < 0.8 ? 10 : 0;

  /* ── CLUSTER HULLS ── */
  if (activeCat === "all" && scale > 0.25) {
    const clusterDefs = [
      { ids: categories.intel_il, color: "59,130,246" },
      { ids: categories.intel_uk, color: "168,85,247" },
      { ids: categories.intel_us, color: "239,68,68" },
      { ids: categories.intel_ru, color: "251,113,133" },
      { ids: categories.intel_ae, color: "234,179,8" },
    ];
    for (const cl of clusterDefs) {
      const pts = cl.ids.map(id => nodeMap.get(id)).filter(n => n && visSet.has(n.id));
      if (pts.length < 3) continue;
      let cx=0, cy=0;
      for (const p of pts) { cx += p.x; cy += p.y; }
      cx /= pts.length; cy /= pts.length;
      let rx = 0, ry = 0;
      for (const p of pts) {
        rx = Math.max(rx, Math.abs(p.x - cx));
        ry = Math.max(ry, Math.abs(p.y - cy));
      }
      rx += 50; ry += 50;
      ctx.beginPath();
      ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${cl.color},0.02)`;
      ctx.fill();
      ctx.strokeStyle = `rgba(${cl.color},0.06)`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }

  /* ── LINKS ── */
  for (let i = 0; i < links.length; i++) {
    const l = links[i];
    const s = l.source, t = l.target;
    const sid = s.id||s, tid = t.id||t;
    if (!visSet.has(sid) || !visSet.has(tid)) continue;
    if (linkStrengths[i] < minStrength) continue;

    const str = linkStrengths[i];

    /* Zoom-level culling */
    if (!showWeakLinks && str < 0.4) continue;
    if (!showMedLinks && str < 0.6) continue;

    let alpha, lineW;
    if (conn) {
      if (sid === hoveredNode.id || tid === hoveredNode.id) {
        alpha = 0.5 + str * 0.4;
        lineW = Math.max(1.0, str * 2.5);
      } else {
        continue;
      }
    } else {
      alpha = str >= 0.8 ? 0.22 :
              str >= 0.6 ? 0.12 :
              str >= 0.4 ? 0.06 : 0.03;
      lineW = Math.max(0.3, str * 1.0);
    }

    /* Curve offset */
    const mx = (s.x + t.x) / 2;
    const my = (s.y + t.y) / 2;
    const dx = t.x - s.x, dy = t.y - s.y;
    const len = Math.sqrt(dx*dx + dy*dy) || 1;
    const curvature = ((i % 7) - 3) * 0.05 * len / 5;
    const cpx = mx + (-dy / len) * curvature;
    const cpy = my + (dx / len) * curvature;

    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    if (Math.abs(curvature) > 2) {
      ctx.quadraticCurveTo(cpx, cpy, t.x, t.y);
    } else {
      ctx.lineTo(t.x, t.y);
    }

    ctx.lineWidth = lineW;
    if (str >= 0.8)      ctx.strokeStyle = `rgba(239,68,68,${alpha})`;
    else if (str >= 0.6) ctx.strokeStyle = `rgba(251,146,60,${alpha})`;
    else if (str >= 0.4) ctx.strokeStyle = `rgba(100,116,139,${alpha})`;
    else                 ctx.strokeStyle = `rgba(71,85,105,${alpha})`;
    ctx.stroke();
  }

  /* ── NODES ── */
  for (let i = 0; i < nodes.length; i++) {
    const d = nodes[i];
    if (!visSet.has(d.id)) continue;

    const op = nodeOpacity[i];
    if (op <= 0.01) continue;

    const r = d.radius * S;
    const color = nodeColor(d);

    let finalOp;
    if (conn) {
      if (d.id === hoveredNode.id) finalOp = op;
      else if (conn.has(d.id)) finalOp = op * 0.95;
      else if (conn2 && conn2.has(d.id)) finalOp = op * 0.25;
      else finalOp = op * 0.06;
    } else {
      const searchDim = searchQuery && !nodeLabelLC[i].includes(searchQuery);
      finalOp = searchDim ? op * 0.1 : op;
    }

    ctx.globalAlpha = finalOp;

    /* Glow for hovered node */
    if (hoveredNode && d.id === hoveredNode.id) {
      ctx.shadowColor = color;
      ctx.shadowBlur = 20;
    }

    /* Scale up connected nodes on hover */
    const drawR = (conn && conn.has(d.id) && d.id !== hoveredNode?.id) ? r * 1.08 : r;

    /* Node circle */
    ctx.beginPath();
    ctx.arc(d.x, d.y, drawR, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();

    ctx.shadowColor = "transparent";
    ctx.shadowBlur = 0;

    ctx.strokeStyle = forceBlue.has(d.id) ? "rgba(96,165,250,0.4)"
                    : confirmedSet.has(d.id) ? "rgba(239,68,68,0.4)"
                    : "rgba(255,255,255,0.12)";
    ctx.lineWidth = 1.2;
    ctx.stroke();
  }

  ctx.globalAlpha = 1;

  /* ── LABELS ── */
  if (showLabels) {
    const fontSize = Math.max(6, Math.min(9, 7 / Math.sqrt(Math.max(0.3, scale))));
    ctx.font = `500 ${fontSize}px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "top";

    for (let i = 0; i < nodes.length; i++) {
      const d = nodes[i];
      if (!visSet.has(d.id)) continue;
      const op = nodeOpacity[i];
      if (op <= 0.01) continue;

      /* Skip small labels at low zoom unless hovered */
      if (d.radius < minRadiusForLabel && !(conn && conn.has(d.id))) continue;

      let labelOp;
      if (conn) {
        if (d.id === hoveredNode.id) labelOp = 1.0;
        else if (conn.has(d.id)) labelOp = 0.9;
        else if (conn2 && conn2.has(d.id)) labelOp = 0.15;
        else labelOp = 0.0;
      } else {
        const searchDim = searchQuery && !nodeLabelLC[i].includes(searchQuery);
        labelOp = searchDim ? 0.05 : 0.85;
      }

      if (labelOp <= 0.01) continue;
      ctx.globalAlpha = op * labelOp;

      const lx = d.x;
      const nodeR = d.radius * S;
      const labelDrawR = (conn && conn.has(d.id) && d.id !== hoveredNode?.id) ? nodeR * 1.08 : nodeR;
      const ly = d.y + labelDrawR + 1.2 + 4;

      ctx.fillStyle = forceBlue.has(d.id) ? "#93c5fd"
                    : confirmedSet.has(d.id) ? "#fca5a5"
                    : "#94a3b8";
      ctx.fillText(d.label, lx, ly);
    }
  }

  ctx.globalAlpha = 1;
  ctx.restore();

  /* ── MINIMAP ── */
  {
    const mmW = 140, mmH = 90, mmPad = 10;
    const mmX = W - mmW - mmPad, mmY = H - mmH - mmPad;
    let bx0=Infinity, by0=Infinity, bx1=-Infinity, by1=-Infinity, cnt=0;
    for (const d of nodes) {
      if (!visSet.has(d.id)) continue;
      if (d.x < bx0) bx0=d.x; if (d.y < by0) by0=d.y;
      if (d.x > bx1) bx1=d.x; if (d.y > by1) by1=d.y;
      cnt++;
    }
    if (cnt > 2 && bx1 > bx0) {
      const mPad = 10;
      const mScale = Math.min((mmW - mPad*2) / (bx1-bx0||1), (mmH - mPad*2) / (by1-by0||1));
      const mOx = mmX + mmW/2 - (bx0+bx1)/2 * mScale;
      const mOy = mmY + mmH/2 - (by0+by1)/2 * mScale;

      ctx.fillStyle = "rgba(15,23,42,0.8)";
      ctx.fillRect(mmX, mmY, mmW, mmH);
      ctx.strokeStyle = "rgba(51,65,85,0.4)";
      ctx.lineWidth = 1;
      ctx.strokeRect(mmX, mmY, mmW, mmH);

      for (const d of nodes) {
        if (!visSet.has(d.id)) continue;
        const mx = mOx + d.x * mScale;
        const my = mOy + d.y * mScale;
        if (mx < mmX || mx > mmX+mmW || my < mmY || my > mmY+mmH) continue;
        ctx.beginPath();
        ctx.arc(mx, my, 1.2, 0, Math.PI*2);
        ctx.fillStyle = nodeColor(d);
        ctx.globalAlpha = 0.5;
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      /* Viewport rectangle */
      const vx0 = mOx + (-tx/scale) * mScale;
      const vy0 = mOy + (-ty/scale) * mScale;
      const vw = (W/scale) * mScale;
      const vh = (H/scale) * mScale;
      ctx.strokeStyle = "rgba(99,102,241,0.4)";
      ctx.lineWidth = 1;
      ctx.strokeRect(
        Math.max(mmX, vx0), Math.max(mmY, vy0),
        Math.min(vw, mmW), Math.min(vh, mmH)
      );
    }
  }
}

function scheduleRedraw() {
  if (!rafId) rafId = requestAnimationFrame(draw);
}

/* ── OPACITY ANIMATION ── */
const opacityTargets = new Float32Array(nodes.length).fill(0);
let animating = false;
let animRafId = null;

function tickOpacity() {
  animRafId = null;
  let stillMoving = false;
  for (let i = 0; i < nodes.length; i++) {
    const diff = opacityTargets[i] - nodeOpacity[i];
    if (Math.abs(diff) > 0.01) {
      nodeOpacity[i] += diff * 0.12;
      stillMoving = true;
    } else {
      nodeOpacity[i] = opacityTargets[i];
    }
  }
  draw();
  if (stillMoving) animRafId = requestAnimationFrame(tickOpacity);
  else animating = false;
}

function setOpacityTargets() {
  for (let i = 0; i < nodes.length; i++) {
    opacityTargets[i] = visSet.has(nodes[i].id) ? 0.9 : 0;
  }
  if (!animating) {
    animating = true;
    animRafId = requestAnimationFrame(tickOpacity);
  }
}

/* ── LABEL PLACEMENT ── */
function placeLabels(vis) {
  const LH = 10, PAD = 1, charW = 5.2;
  const active = vis || visSet;

  /* 12 angles — but weighted toward below-center */
  const angles = [];
  for (let i = 0; i < 12; i++) angles.push((i / 12) * Math.PI * 2);
  const dists = [1.0, 1.2, 1.45];

  const sorted = nodes.slice()
    .filter(d => active.has(d.id))
    .sort((a, b) => b.radius - a.radius);

  const CELL = 50;
  const grid = new Map();
  function addToGrid(rect) {
    const x0 = (rect.ax / CELL) | 0, x1 = (rect.ar / CELL) | 0;
    const y0 = (rect.ay / CELL) | 0, y1 = (rect.ab / CELL) | 0;
    for (let gx = x0; gx <= x1; gx++) {
      for (let gy = y0; gy <= y1; gy++) {
        const k = gx + ',' + gy;
        if (!grid.has(k)) grid.set(k, []);
        grid.get(k).push(rect);
      }
    }
  }
  function gridNear(ax, ay, ar, ab) {
    const x0 = (ax / CELL) | 0, x1 = (ar / CELL) | 0;
    const y0 = (ay / CELL) | 0, y1 = (ab / CELL) | 0;
    const seen = new Set();
    const result = [];
    for (let gx = x0; gx <= x1; gx++) {
      for (let gy = y0; gy <= y1; gy++) {
        const cell = grid.get(gx + ',' + gy);
        if (cell) for (const r of cell) {
          if (!seen.has(r)) { seen.add(r); result.push(r); }
        }
      }
    }
    return result;
  }

  const activeNodes = sorted.map(d => ({ x: d.x, y: d.y, r: d.radius * S + 2 }));

  for (const d of sorted) {
    const r = d.radius * S + PAD;
    const lw = d.label.length * charW + 4;
    /* Default: directly below, snug against the node */
    let bestScore = Infinity, bestDx = 0, bestDy = r + LH * 0.6;

    for (const distMul of dists) {
      if (bestScore <= 0) break;
      for (const ang of angles) {
        /* Place label center along the angle, just outside the node */
        const dist = (r + LH * 0.5) * distMul;
        const cx = d.x + Math.cos(ang) * dist;
        const cy = d.y + Math.sin(ang) * dist;
        const ax = cx - lw / 2, ay = cy - LH / 2;
        const ar = cx + lw / 2, ab = cy + LH / 2;
        let score = 0;

        /* Penalise overlap with nodes */
        for (const n of activeNodes) {
          const clx = Math.max(ax, Math.min(ar, n.x));
          const cly = Math.max(ay, Math.min(ab, n.y));
          const ddx = n.x - clx, ddy = n.y - cly;
          if (ddx * ddx + ddy * ddy < n.r * n.r) { score += 300; break; }
        }
        if (score >= 300 && bestScore < 300) continue;

        /* Penalise overlap with placed labels */
        const nearby = gridNear(ax, ay, ar, ab);
        for (const p of nearby) {
          if (ar > p.ax && ax < p.ar && ab > p.ay && ay < p.ab) {
            const overlapX = Math.min(ar, p.ar) - Math.max(ax, p.ax);
            const overlapY = Math.min(ab, p.ab) - Math.max(ay, p.ay);
            score += 80 + (overlapX * overlapY) * 0.8;
          }
        }

        /* Heavy penalty for distance — labels must stay close */
        score += (distMul - 1.0) * 60;

        /* Strong preference for directly below (ang ≈ π/2) */
        const belowness = Math.cos(ang - Math.PI * 0.5); /* 1.0 when pointing straight down */
        score -= belowness * 8;

        /* Slight preference for below-right over below-left */
        if (ang > Math.PI * 0.25 && ang < Math.PI * 0.75) score -= 2;

        if (score < bestScore) {
          bestScore = score;
          bestDx = cx - d.x;
          bestDy = cy - d.y;
          if (score <= 0) break;
        }
      }
    }

    d._lx = bestDx;
    d._ly = bestDy;
    const rect = {
      ax: d.x + bestDx - lw / 2,
      ay: d.y + bestDy - LH / 2,
      ar: d.x + bestDx + lw / 2,
      ab: d.y + bestDy + LH / 2
    };
    addToGrid(rect);
  }
}

/* ── CAMERA ── */
function panTo(targetTx, targetTy, targetScale, duration) {
  const startTx = tx, startTy = ty, startScale = scale;
  const startTime = performance.now();
  function step(now) {
    const t = Math.min((now - startTime) / duration, 1);
    const ease = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
    tx = startTx + (targetTx - startTx) * ease;
    ty = startTy + (targetTy - startTy) * ease;
    scale = startScale + (targetScale - startScale) * ease;
    scheduleRedraw();
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

/* ── SIMULATION CONTROL ── */
let simRunning = false, refitTimer = null;

function restoreDefaultForces() {
  sim.force("center", d3.forceCenter(W/2,H/2))
     .force("x", d3.forceX(W/2).strength(0.09))
     .force("y", d3.forceY(H/2).strength(0.09))
     .force("charge", d3.forceManyBody().strength(d=>-(d.radius*S)*8).distanceMax(350))
     .force("collision", d3.forceCollide().radius(d=>(d.radius*S)+3));
}

function freezeSimulation() {
  if (refitTimer) { clearTimeout(refitTimer); refitTimer = null; }
  sim.stop(); simRunning = false;
  sim.on("tick.refit", null).on("end.refit", null);
  for (const d of nodes) { d.x=d._ox; d.y=d._oy; d.fx=d._ox; d.fy=d._oy; }
  placeLabels(null);
}

function unfreezeNodes() { for (const d of nodes) { d.fx=null; d.fy=null; } }

function isFullView() { return activeCat === "all"; }

function refitVisibleNodes() {
  if (refitTimer) clearTimeout(refitTimer);
  refitTimer = setTimeout(() => {
    const vis = getVisibleSet();
    if (!vis.size) return;
    if (simRunning) { sim.stop(); simRunning = false; }
    unfreezeNodes();

    const cx = W/2, cy = H/2;
    const visCount = vis.size;
    const chargeMul = visCount < 15 ? 18 : visCount < 40 ? 14 : 10;
    const centerStr = visCount < 15 ? 0.3 : visCount < 40 ? 0.2 : 0.12;

    sim.force("center", d3.forceCenter(cx,cy).strength(1))
       .force("x", d3.forceX(cx).strength(d => vis.has(d.id)?centerStr:0))
       .force("y", d3.forceY(cy).strength(d => vis.has(d.id)?centerStr:0))
       .force("charge", d3.forceManyBody().strength(d => vis.has(d.id)?-(d.radius*S)*chargeMul:0).distanceMax(500))
       .force("collision", d3.forceCollide().radius(d => vis.has(d.id)?(d.radius*S)+6:0));

    sim.on("tick.refit", () => {
      /* Snapshot settled positions each tick so labels track correctly */
      for (const d of nodes) { if (vis.has(d.id)) { d._ox = d.x; d._oy = d.y; } }
      scheduleRedraw();
    });
    sim.on("end.refit", () => {
      simRunning = false;
      sim.on("tick.refit",null).on("end.refit",null);
      sim.stop();
      /* Freeze all nodes in place — no further movement */
      for (const d of nodes) {
        d.fx = d.x; d.fy = d.y;
        d._ox = d.x; d._oy = d.y;
      }
      restoreDefaultForces();
      placeLabels(vis);
      scheduleRedraw();
    });
    simRunning = true;
    sim.alpha(0.7).alphaDecay(0.025).alphaTarget(0).restart();
  }, 100);
}

/* ── APPLY FILTERS ── */
function applyFilters() {
  invalidateVis();
  visSet = getVisibleSet();
  setOpacityTargets();
  updateStats();
}

function updateStats() {
  let visL = 0;
  for (let i = 0; i < links.length; i++) {
    if (linkStrengths[i] >= minStrength && visSet.has(linkSrcIds[i]) && visSet.has(linkTgtIds[i])) visL++;
  }
  document.getElementById("stats").innerHTML =
    `${visSet.size} of ${nodes.length} nodes · ${visL} of ${links.length} links<br>Scroll to zoom · Drag to pan<br>Hover to highlight · Click for dossier`;
}

/* ── MOUSE / TOUCH INTERACTION ── */
const tipEl = document.getElementById("tooltip");

function toGraph(cx, cy) {
  return { x: (cx - tx) / scale, y: (cy - ty) / scale };
}

function hitTest(gx, gy) {
  for (let i = nodes.length - 1; i >= 0; i--) {
    const d = nodes[i];
    if (!visSet.has(d.id)) continue;
    const r = d.radius * S + 2;
    const dx = gx - d.x, dy = gy - d.y;
    if (dx*dx + dy*dy <= r*r) return d;
  }
  return null;
}

function showTooltip(d, clientX, clientY) {
  const nodeCats = Object.entries(categories).filter(([,v])=>v.includes(d.id)).map(([k])=>catNames[k]);
  let h = `<div class="name" style="color:${C[d.type]||'#64748b'}">${d.label}</div>`;
  if (d.agency) h += `<div style="font-size:10px;color:#64748b;margin-bottom:4px">${d.agency}</div>`;
  if (d.role)   h += `<div><span class="lbl">Role: </span>${d.role}</div>`;
  if (d.yearsActive) h += `<div><span class="lbl">Active: </span>${d.yearsActive}</div>`;
  if (d.status) h += `<div><span class="lbl">Status: </span>${d.status}</div>`;
  if (nodeCats.length) h += `<div style="margin-top:5px;color:#64748b;font-size:10px">${nodeCats.join(' · ')}</div>`;
  h += `<div class="hint">Click to open dossier →</div>`;
  tipEl.innerHTML = h;
  tipEl.style.display = "block";
  tipEl.style.transform = `translate3d(${clientX+15}px,${clientY-10}px,0)`;
}

/* Pan/zoom state */
let isPanning = false, panStartX = 0, panStartY = 0, panStartTx = 0, panStartTy = 0;
let dragNode = null, dragStartX = 0, dragStartY = 0;
let mouseDownX = 0, mouseDownY = 0, mouseDownTime = 0;

canvas.addEventListener("mousedown", e => {
  if (e.button !== 0) return;
  mouseDownX = e.clientX; mouseDownY = e.clientY; mouseDownTime = Date.now();
  const g = toGraph(e.clientX, e.clientY);
  const hit = hitTest(g.x, g.y);
  if (hit) {
    dragNode = hit;
    dragStartX = e.clientX; dragStartY = e.clientY;
    hit.fx = hit.x; hit.fy = hit.y;
    sim.alphaTarget(0.06).restart();
  } else {
    isPanning = true;
    panStartX = e.clientX; panStartY = e.clientY;
    panStartTx = tx; panStartTy = ty;
  }
});

canvas.addEventListener("mousemove", e => {
  if (dragNode) {
    const g = toGraph(e.clientX, e.clientY);
    dragNode.fx = g.x; dragNode.fy = g.y;
    dragNode.x  = g.x; dragNode.y  = g.y;
    scheduleRedraw();
    return;
  }
  if (isPanning) {
    tx = panStartTx + (e.clientX - panStartX);
    ty = panStartTy + (e.clientY - panStartY);
    scheduleRedraw();
    return;
  }
  const g = toGraph(e.clientX, e.clientY);
  const hit = hitTest(g.x, g.y);
  if (hit !== hoveredNode) {
    hoveredNode = hit;
    scheduleRedraw();
  }
  if (hit) {
    showTooltip(hit, e.clientX, e.clientY);
    canvas.style.cursor = "pointer";
  } else {
    tipEl.style.display = "none";
    canvas.style.cursor = "default";
  }
});

canvas.addEventListener("mouseup", e => {
  if (dragNode) {
    const moved = Math.hypot(e.clientX - dragStartX, e.clientY - dragStartY);
    const elapsed = Date.now() - mouseDownTime;
    if (moved < 5 && elapsed < 300) openDossier(dragNode);
    /* After drag — freeze the node where it landed */
    dragNode._ox = dragNode.x; dragNode._oy = dragNode.y;
    dragNode.fx = dragNode.x; dragNode.fy = dragNode.y;
    dragNode = null;
    sim.alphaTarget(0).alpha(0.0001);
    scheduleRedraw();
  }
  if (isPanning) {
    isPanning = false;
    const moved = Math.hypot(e.clientX - mouseDownX, e.clientY - mouseDownY);
    if (moved < 5) document.getElementById("dossier").classList.remove("open");
  }
});

canvas.addEventListener("mouseleave", () => {
  if (dragNode) {
    dragNode._ox = dragNode.x; dragNode._oy = dragNode.y;
    dragNode.fx = dragNode.x; dragNode.fy = dragNode.y;
    dragNode = null;
    sim.alphaTarget(0).alpha(0.0001);
  }
  hoveredNode = null; isPanning = false;
  tipEl.style.display = "none";
  scheduleRedraw();
});

canvas.addEventListener("wheel", e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.91;
  const newScale = Math.max(0.1, Math.min(8, scale * factor));
  tx = e.clientX - (e.clientX - tx) * (newScale / scale);
  ty = e.clientY - (e.clientY - ty) * (newScale / scale);
  scale = newScale;
  scheduleRedraw();
}, { passive: false });

/* Touch support */
let lastTouchDist = 0, touchPanX = 0, touchPanY = 0;
canvas.addEventListener("touchstart", e => {
  if (e.touches.length === 2) {
    lastTouchDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
  } else if (e.touches.length === 1) {
    touchPanX = e.touches[0].clientX; touchPanY = e.touches[0].clientY;
    panStartTx = tx; panStartTy = ty;
  }
}, {passive:true});
canvas.addEventListener("touchmove", e => {
  e.preventDefault();
  if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    const factor = d / lastTouchDist;
    const mx = (e.touches[0].clientX+e.touches[1].clientX)/2;
    const my = (e.touches[0].clientY+e.touches[1].clientY)/2;
    const ns = Math.max(0.1, Math.min(8, scale*factor));
    tx = mx - (mx-tx)*(ns/scale); ty = my - (my-ty)*(ns/scale); scale = ns;
    lastTouchDist = d;
  } else if (e.touches.length === 1) {
    tx = panStartTx + (e.touches[0].clientX - touchPanX);
    ty = panStartTy + (e.touches[0].clientY - touchPanY);
  }
  scheduleRedraw();
}, {passive:false});

/* ── SEARCH SPOTLIGHT ── */
document.getElementById("search").addEventListener("input", e => {
  searchQuery = e.target.value.toLowerCase();
  if (searchQuery.length >= 2) {
    const match = nodes.find(n => visSet.has(n.id) && nodeLabelLC[nodes.indexOf(n)].includes(searchQuery));
    if (match) {
      hoveredNode = match;
    }
  } else {
    hoveredNode = null;
  }
  invalidateVis();
  visSet = getVisibleSet();
  scheduleRedraw();
});

/* ── DOSSIER ── */
function openDossier(d) {
  tipEl.style.display = "none";
  const color = C[d.type]||"#64748b";
  const light = Clight[d.type]||"rgba(100,116,139,0.1)";
  const border = Cborder[d.type]||"rgba(100,116,139,0.25)";
  const isCore = coreSet.has(d.id);
  document.getElementById("dossier-name").textContent = d.label;
  const agEl = document.getElementById("dossier-agency");
  agEl.textContent = d.agency||""; agEl.style.display = d.agency?"block":"none";
  const roEl = document.getElementById("dossier-role");
  roEl.textContent = d.role||""; roEl.style.display = d.role?"block":"none";
  const statusEl = document.getElementById("dossier-status");
  if (d.status) {
    statusEl.textContent = d.status; statusEl.style.display = "inline-block";
    const isDead=/DECEASED|DIED/.test(d.status), isConv=/CONVICTED/.test(d.status);
    const isFled=/FLED/.test(d.status), isImm=/IMMUNITY/.test(d.status);
    statusEl.style.background = isDead?"rgba(100,116,139,0.1)":isConv?"rgba(248,113,113,0.1)":isFled?"rgba(251,146,60,0.1)":isImm?"rgba(250,204,21,0.1)":light;
    statusEl.style.color = isDead?"#64748b":isConv?"#f87171":isFled?"#fb923c":isImm?"#facc15":color;
    statusEl.style.border = "1px solid "+(isDead?"rgba(100,116,139,0.2)":isConv?"rgba(248,113,113,0.2)":isFled?"rgba(251,146,60,0.2)":isImm?"rgba(250,204,21,0.2)":border);
  } else { statusEl.style.display = "none"; }
  const nwEl = document.getElementById("dossier-networth");
  nwEl.textContent = d.networth||""; nwEl.style.display = d.networth?"inline-block":"none";
  const stamps={center:"TARGET",convicted:"CONVICTED",suspicious:"SUSPECT",possibly:"MONITOR"};
  document.getElementById("dossier-stamp").textContent = stamps[d.type]||"FILE";
  const body = document.getElementById("dossier-body");
  const parts = [];
  if (isCore) parts.push(`<div style="margin-bottom:16px"><span class="core-badge">⬤ OPERATIONAL RING</span></div>`);
  const isUncertain = categories.uncertain.includes(d.id) && !categories.named.includes(d.id);
  if (isUncertain) parts.push(`<div class="dossier-callout gray" style="margin-bottom:16px">⚠ Documented connection — role uncertain.</div>`);
  if (d.intelRole)    parts.push(`<div class="dossier-section"><h3>Intelligence Assessment</h3><div class="dossier-callout red">${d.intelRole}</div></div>`);
  if (d.epsteinLink)  parts.push(`<div class="dossier-section"><h3>Epstein Connection</h3><div class="dossier-callout">${d.epsteinLink}</div></div>`);
  if (d.significance) parts.push(`<div class="dossier-section"><h3>Why This Matters</h3><div class="dossier-callout blue">${d.significance}</div></div>`);
  if (d.desc)         parts.push(`<div class="dossier-section"><h3>Summary</h3><p>${d.desc}</p></div>`);
  if (d.evidence)     parts.push(`<div class="dossier-section"><h3>Evidence</h3><p>${d.evidence}</p></div>`);
  if (d.link)         parts.push(`<div class="dossier-section"><h3>Analyst Note</h3><p style="color:#64748b;font-style:italic">${d.link}</p></div>`);
  const nodeCats = Object.entries(categories).filter(([,v])=>v.includes(d.id)).map(([k])=>k);
  if (nodeCats.length) parts.push(`<div class="dossier-section"><h3>Network Role</h3><div style="display:flex;gap:4px;flex-wrap:wrap">${nodeCats.map(c=>`<span class="cat-tag" style="background:${catColors[c]}">${catNames[c]}</span>`).join("")}</div></div>`);
  const yearsHtml = (() => {
    if (d.yearsActive) return `<div class="dossier-field"><div class="fl">Years Active</div><div class="fv">${d.yearsActive}</div></div>`;
    if (d.yearsFrom || d.yearsTo) return `<div class="dossier-field"><div class="fl">Years Active</div><div class="fv">${d.yearsFrom||"?"} – ${d.yearsTo||"present"}</div></div>`;
    const txt = [(d.desc||""),(d.evidence||""),(d.epsteinLink||""),(d.intelRole||"")].join(" ");
    const m = [...new Set((txt.match(/\b(19[6-9]\d|20[0-3]\d)\b/g)||[]))].map(Number).sort((a,b)=>a-b);
    if (m.length >= 2) return `<div class="dossier-field"><div class="fl">Years Referenced</div><div class="fv">${m[0]} – ${m[m.length-1]}</div></div>`;
    if (m.length === 1) return `<div class="dossier-field"><div class="fl">Year Referenced</div><div class="fv">${m[0]}</div></div>`;
    return "";
  })();
  parts.push(`<div class="dossier-section"><h3>Profile</h3>
    <div class="dossier-field"><div class="fl">Subject ID</div><div class="fv" style="font-family:ui-monospace,monospace;color:${color}">${d.id.toUpperCase()}</div></div>
    <div class="dossier-field"><div class="fl">Classification</div><div class="fv">${typeLabel[d.type]||d.type}</div></div>
    ${d.networth?`<div class="dossier-field"><div class="fl">Net Worth</div><div class="fv">${d.networth}</div></div>`:""}
    ${yearsHtml}</div>`);
  const conns = [];
  for (const l of links) {
    const sid=l.source.id||l.source, tid=l.target.id||l.target;
    if (sid===d.id) { const t=nodeMap.get(tid); if(t) conns.push({node:t,strength:l.strength||0.5,direction:"→"}); }
    if (tid===d.id) { const s=nodeMap.get(sid); if(s) conns.push({node:s,strength:l.strength||0.5,direction:"←"}); }
  }
  conns.sort((a,b)=>b.strength-a.strength);
  parts.push(`<div class="dossier-section"><h3>Connections (${conns.length})</h3><ul class="conn-list">${
    conns.map(c=>{
      const sc=c.strength>=0.7?"str-high":c.strength>=0.4?"str-med":"str-low";
      const opTag=coreSet.has(c.node.id)?` <span style="color:#f87171;font-size:8px">●</span>`:"";
      return `<li data-id="${c.node.id}"><span class="conn-name"><span style="color:${C[c.node.type]||'#64748b'}">●</span> ${c.direction} ${c.node.label}${opTag}</span><span class="conn-strength ${sc}">${Math.round(c.strength*100)}%</span></li>`;
    }).join("")
  }</ul></div>`);
  const threatLevel=d.type==="center"?"CRITICAL":d.type==="convicted"?"HIGH":isCore?"HIGH":conns.length>10?"ELEVATED":conns.length>5?"MODERATE":"LOW";
  const tC={CRITICAL:"#f87171",HIGH:"#fb923c",ELEVATED:"#fbbf24",MODERATE:"#818cf8",LOW:"#475569"};
  const tB={CRITICAL:"rgba(248,113,113,0.1)",HIGH:"rgba(251,146,60,0.1)",ELEVATED:"rgba(251,191,36,0.1)",MODERATE:"rgba(129,140,248,0.1)",LOW:"rgba(71,85,105,0.1)"};
  parts.push(`<div class="dossier-section"><h3>Assessment</h3>
    <span class="threat-badge" style="background:${tB[threatLevel]};color:${tC[threatLevel]};border:1px solid ${tC[threatLevel]}30">${threatLevel}</span>
    <div style="margin-top:8px;color:#475569;font-size:11px">${conns.length} direct connections · Network weight: ${d.radius}</div></div>`);
  parts.push(`<div style="margin-top:24px;padding-top:12px;border-top:1px solid #334155;color:#334155;font-size:9px;text-align:center;letter-spacing:0.5px">FILE REF: EP-NET-${d.id.toUpperCase()} · CLASSIFICATION: RESTRICTED</div>`);
  body.innerHTML = parts.join("");
  body.querySelector(".conn-list")?.addEventListener("click", e => {
    const li = e.target.closest("li[data-id]");
    if (!li) return;
    const t = nodeMap.get(li.dataset.id);
    if (t) openDossier(t);
  });
  document.getElementById("dossier").classList.add("open");
}

/* ── WRITEUPS ── */
function openWriteup(key) {
  if (typeof writeups === 'undefined' || !writeups[key]) return;
  document.getElementById("writeup-content").innerHTML = writeups[key];
  document.getElementById("writeup-overlay").classList.add("visible");
  document.getElementById("writeup-close").style.display = "block";
  document.querySelectorAll("#writeup-nav .nav-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.writeup === key);
  });
}
function closeWriteup() {
  document.getElementById("writeup-overlay").classList.remove("visible");
  document.getElementById("writeup-close").style.display = "none";
  document.querySelectorAll("#writeup-nav .nav-btn").forEach(b => b.classList.remove("active"));
}

/* ── INITIALIZATION ── */
document.getElementById("dossier-close").addEventListener("click", () => {
  document.getElementById("dossier").classList.remove("open");
});

document.getElementById("labels").addEventListener("change", e => {
  showLabels = e.target.checked;
  scheduleRedraw();
});

document.getElementById("orphans").addEventListener("change", e => {
  showOrphans = e.target.checked;
  applyFilters();
});

document.getElementById("str").addEventListener("input", e => {
  minStrength = +e.target.value;
  document.getElementById("sv").textContent = minStrength.toFixed(1);
  applyFilters();
});

document.querySelectorAll(".tf").forEach(cb => {
  cb.addEventListener("change", () => { applyFilters(); });
});

document.querySelectorAll("#cat-buttons .cat-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("#cat-buttons .cat-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    activeCat = btn.dataset.cat;
    if (isFullView()) {
      if (refitTimer) { clearTimeout(refitTimer); refitTimer = null; }
      if (simRunning) { sim.stop(); simRunning = false; sim.on("tick.refit",null).on("end.refit",null); }
      /* Restore all nodes to their frozen positions */
      for (const d of nodes) { d.x = d._ox; d.y = d._oy; d.fx = d._ox; d.fy = d._oy; }
      applyFilters();
      placeLabels(null);
      scheduleRedraw();
    } else {
      freezeSimulation();
      applyFilters();
      refitVisibleNodes();
    }
  });
});

document.querySelectorAll("#writeup-nav .nav-btn").forEach(btn => {
  btn.addEventListener("click", () => openWriteup(btn.dataset.writeup));
});

/* Force "possibly" unchecked on load */
document.querySelectorAll(".tf").forEach(el => {
  if (el.value === "possibly") el.checked = false;
});

/* Initial filter + layout */
applyFilters();
placeLabels(visSet);

/* Freeze all nodes immediately after initial settle — no breathing */
for (const d of nodes) { d.fx = d._ox; d.fy = d._oy; }
sim.stop();

/* Fit initial camera without animation */
{
  const visNodes = nodes.filter(d => visSet.has(d.id));
  if (visNodes.length) {
    let x0=Infinity, y0=Infinity, x1=-Infinity, y1=-Infinity;
    for (const d of visNodes) {
      const r = d.radius * S;
      if (d.x-r < x0) x0=d.x-r; if (d.y-r < y0) y0=d.y-r;
      if (d.x+r > x1) x1=d.x+r; if (d.y+r > y1) y1=d.y+r;
    }
    const pad = 100;
    const bw = x1-x0+pad*2, bh = y1-y0+pad*2;
    scale = Math.min(W/bw, H/bh, 2.0);
    tx = W/2 - (x0+x1)/2 * scale;
    ty = H/2 - (y0+y1)/2 * scale;
  }
}

draw();

/* Re-place labels after short settle then freeze permanently */
setTimeout(() => { placeLabels(visSet); scheduleRedraw(); }, 400);
</script>
