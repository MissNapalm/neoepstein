<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Epstein Network Graph</title>
<link rel="stylesheet" href="app.css?v=35">
</head>
<body>

<div id="controls">
  <h1 id="ctrl-title">Epstein Network</h1>
  <div class="sub" id="ctrl-sub">Interactive intelligence graph</div>
  <input type="text" id="search" placeholder="Search by name…">

  <h2 id="ctrl-filter-h">Filter by relationship</h2>
  <div class="cat-buttons" id="cat-buttons">
    <button class="cat-btn active"  data-cat="all">All</button>
    <button class="cat-btn"         data-cat="operational">Operational</button>
    <button class="cat-btn"         data-cat="financial">Financial</button>
    <button class="cat-btn"         data-cat="legal">Legal</button>
    <button class="cat-btn"         data-cat="intel">Intel</button>
    <button class="cat-btn"         data-cat="intel_il">🇮🇱 Mossad</button>
    <button class="cat-btn"         data-cat="intel_us">🇺🇸 CIA/FBI</button>
    <button class="cat-btn"         data-cat="intel_uk">🇬🇧 MI5/6</button>
    <button class="cat-btn"         data-cat="intel_ru">🇷🇺 KGB/FSB</button>
    <button class="cat-btn"         data-cat="intel_ae">🇦🇪 Gulf</button>
    <button class="cat-btn"         data-cat="named">Named</button>
    <button class="cat-btn"         data-cat="cover">Cover</button>
    <button class="cat-btn"         data-cat="uncertain">Uncertain</button>
    <button class="cat-btn conf-btn" data-cat="confirmed">⚠ Confirmed</button>
  </div>

  <h2>Classification</h2>
  <label><input type="checkbox" class="tf" value="center"    checked><span class="dot dot-center"    style="background:#ff2a2a"></span>Principal Targets</label>
  <label><input type="checkbox" class="tf" value="convicted" checked><span class="dot dot-convicted" style="background:#ff2a2a"></span>Convicted</label>
  <label><input type="checkbox" class="tf" value="suspicious" checked><span class="dot dot-suspicious" style="background:#ff6b1a"></span>Suspicious</label>
  <label><input type="checkbox" class="tf" value="possibly"><span class="dot dot-possibly" style="background:#e8e0f0"></span>Possibly Involved</label>

  <h2>Min link strength: <span id="sv">0</span></h2>
  <input type="range" id="str" min="0" max="1" step="0.1" value="0">

  <h2>Display</h2>
  <label><input type="checkbox" id="labels" checked> Show labels</label>
  <label><input type="checkbox" id="orphans" checked> Show unlinked nodes</label>

  <h2>Zoom: <span id="zv">100</span>%</h2>
  <input type="range" id="zoom-slider" min="10" max="800" step="1" value="100">

  <h2>Node Size: <span id="nsv">100</span>%</h2>
  <input type="range" id="node-size-slider" min="20" max="300" step="5" value="100">

  <h2>Color Theme</h2>
  <div class="theme-row" id="theme-buttons">
    <button class="theme-btn active" data-theme="default">Default</button>
    <button class="theme-btn"        data-theme="ice">❄ Ice</button>
    <button class="theme-btn"        data-theme="mono">◐ Mono</button>
    <button class="theme-btn"        data-theme="heat">🔥 Heat</button>
    <button class="theme-btn"        data-theme="light">☀ Light</button>
  </div>

  <h2>🎲 Scramble Mode</h2>
  <div id="scramble-row">
    <label style="color:#f59e0b;font-size:12px">Codenames</label>
    <input type="checkbox" id="scramble-toggle">
  </div>

  <div id="stats"></div>
</div>

<div id="tip"></div>

<div id="dos">
  <div class="cls-banner" id="dos-banner">NETWORK INTELLIGENCE DOSSIER — RESTRICTED</div>
  <div id="dos-hdr">
    <button id="dos-x">✕</button>
    <div id="dos-name"></div>
    <div id="dos-role"></div>
    <div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-top:6px">
      <span id="dos-status"></span>
      <span id="dos-nw"></span>
    </div>
  </div>
  <div id="dos-body"></div>
</div>

<canvas id="graph"></canvas>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="list.js?v=35"></script>
<script src="list2.js?v=35"></script>
<script src="dates.js?v=4"></script>
<script src="writeups.js?v=4"></script>
<script src="app.js?v=35"></script>
</body>
</html>
