  const el=new Set(graphData.links.map(l=>l.source+'→'+l.target));

  const s=typeof l.source==='object'?l.source.id:l.source;

function generateScrambleName(){
  const adj=SCRAMBLE_ADJECTIVES[Math.floor(Math.random()*SCRAMBLE_ADJECTIVES.length)];
  const noun=SCRAMBLE_NOUNS[Math.floor(Math.random()*SCRAMBLE_NOUNS.length)];
  return adj+" "+noun;
}

function buildScrambleMap(){
  scrambleMap.clear();
  const used=new Set();
  for(const n of nodes){
    let name;
    do{ name=generateScrambleName(); }while(used.has(name));
    used.add(name);
    scrambleMap.set(n.id,name);
  }
}

  if(scrambleMode) return SCRAMBLE_TITLES[Math.floor(Math.abs(hashStr(d.id))%SCRAMBLE_TITLES.length)];

}

function getDisplayStatus(d){
  if(scrambleMode) return SCRAMBLE_STATUSES[Math.floor(Math.abs(hashStr(d.id+"-s"))%SCRAMBLE_STATUSES.length)];
  return d.status||"";
}

function hashStr(s){
  let h=0;
  for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}
  return h;
}

  d.x=W/2+Math.cos(angle)*dist;

});

let activeCat="all",_visCache=null,visSet=new Set(),hoveredNode=null,searchQuery="",showLabels=true,minStrength=0,showOrphans=true;

function invalidateVis(){_visCache=null;}
function getVisibleSet(){
  if(_visCache) return _visCache;
  const at=new Set();
  document.querySelectorAll(".tf").forEach(el=>{if(el.checked)at.add(el.value);});
  const catSet=activeCat!=="all"?new Set(categories[activeCat]||[]):null;
  let linkedSet=null;
  if(!showOrphans){
    linkedSet=new Set();
    for(let i=0;i<links.length;i++) if(lStr[i]>=minStrength){linkedSet.add(lSrcIds[i]);linkedSet.add(lTgtIds[i]);}
  }
  const vis=new Set();
  for(const d of nodes){
    if(!at.has(d.type)) continue;
    if(catSet&&!catSet.has(d.id)) continue;
    if(linkedSet&&!linkedSet.has(d.id)) continue;
    vis.add(d.id);
  }
  _visCache=vis; return vis;
}

let rafId=null;
let _lastHov=null,_lastScale=-1,_lastTx=NaN,_lastTy=NaN,_dirty=true;
function markDirty(){_dirty=true;}

function draw(){
  rafId=null;

  const t=getTheme();

  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.fillStyle=t.bg;
  ctx.fillRect(0,0,W,H);

  ctx.save();
  ctx.translate(tx,ty);
  ctx.scale(scale,scale);

  const hov=hoveredNode;
  const conn=hov?(adjIndex.get(hov.id)||null):null;
  const conn2=hov?(adj2Cache.get(hov.id)||null):null;
  const showWeak=scale>=0.5,showMed=scale>=0.3;
  const minR4lbl=scale<0.3?22:scale<0.5?15:scale<0.8?10:0;
  const linkRGB=t.linkRGB;

  /* ── links ── */
  ctx.lineWidth=1;
  for(let i=0;i<links.length;i++){
    const str=lStr[i];
    if(str<minStrength) continue;
    if(!showWeak&&str<0.4) continue;
    if(!showMed&&str<0.6) continue;
    const l=links[i],s=l.source,tgt=l.target,sid=lSrcIds[i],tid=lTgtIds[i];
    if(!visSet.has(sid)||!visSet.has(tid)) continue;

    let alpha,lineW;
    if(conn){
      if(sid===hov.id||tid===hov.id){alpha=0.5+str*0.4;lineW=Math.max(1,str*2.5);}
      else continue;
    } else {
      ctx.strokeStyle=linkNormalStroke[linkColorTiers[i]];
      ctx.lineWidth=Math.max(0.3,str);
      ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(tgt.x,tgt.y); ctx.stroke();
      continue;
    }
    const c=linkRGB[linkColorTiers[i]];
    ctx.strokeStyle=`rgba(${c[0]},${c[1]},${c[2]},${alpha.toFixed(2)})`;
    ctx.lineWidth=lineW;
    ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(tgt.x,tgt.y); ctx.stroke();
  }

  /* ── nodes ── */
  ctx.lineWidth=1.2;
  for(let i=0;i<nodes.length;i++){
    const d=nodes[i]; if(!visSet.has(d.id)) continue;
    const op=nodeOpacity[i]; if(op<=0.01) continue;
    const r=d.radius*S,color=nodeColorCache[i];
    let fop;
    if(conn){
      if(d.id===hov.id) fop=op;
      else if(conn.has(d.id)) fop=op*0.95;
      else if(conn2&&conn2.has(d.id)) fop=op*0.25;
      else fop=op*0.06;
    } else {
      fop=(searchQuery&&!nodeLabelLC[i].includes(searchQuery))?op*0.1:op;
    }

    ctx.globalAlpha=fop;
    const isHovered=hov&&d.id===hov.id;
    const isConn=conn&&conn.has(d.id)&&!isHovered;
    const bv=nodeBorderVariant[i];
    const dr=isConn?r*1.08:bv===4?r*0.7:r;

    /* ── drop shadow for light mode ── */
    if(t.isLight){
      ctx.globalAlpha=fop*0.35;
      ctx.beginPath(); ctx.arc(d.x+2,d.y+3,dr,0,Math.PI*2);
      ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fill();
      ctx.globalAlpha=fop;
    }

    if(bv===4){
      ctx.globalAlpha=fop*0.12;
      ctx.beginPath(); ctx.arc(d.x,d.y,dr+10,0,Math.PI*2);
      ctx.fillStyle=t.isLight?'rgba(100,116,139,0.12)':'rgba(168,130,220,0.25)'; ctx.fill();
      ctx.globalAlpha=fop*0.1;
      ctx.beginPath(); ctx.arc(d.x,d.y,dr+3,0,Math.PI*2);
      ctx.fillStyle=t.isLight?'rgba(100,116,139,0.15)':'rgba(192,160,240,0.3)'; ctx.fill();
      ctx.globalAlpha=fop;
    }

    ctx.beginPath(); ctx.arc(d.x,d.y,dr,0,Math.PI*2);
    ctx.fillStyle=color; ctx.fill();

    ctx.strokeStyle=getNodeStroke(bv);
    ctx.stroke();

    if(isHovered){
      ctx.strokeStyle=color; ctx.lineWidth=3; ctx.stroke();
      ctx.globalAlpha=fop*0.25;
      ctx.beginPath(); ctx.arc(d.x,d.y,dr+3,0,Math.PI*2);
      ctx.strokeStyle=color; ctx.lineWidth=2; ctx.stroke();
      ctx.globalAlpha=fop;
      ctx.lineWidth=1.2;
    }
  }
  ctx.globalAlpha=1;

  /* ── labels ── */
  if(showLabels){
    const fs=Math.max(6,Math.min(9,7/Math.sqrt(Math.max(0.3,scale))));
    const fontStr=`500 ${fs}px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif`;
    ctx.font=fontStr;
    ctx.textAlign="center"; ctx.textBaseline="top";

    for(let i=0;i<nodes.length;i++){
      const d=nodes[i]; if(!visSet.has(d.id)) continue;
      const op=nodeOpacity[i]; if(op<=0.01) continue;
      if(d.radius<minR4lbl&&!(conn&&conn.has(d.id))) continue;
      let lop;
      if(conn){
        if(d.id===hov.id) lop=1;
        else if(conn.has(d.id)) lop=0.9;
        else if(conn2&&conn2.has(d.id)) lop=0.15;
        else lop=0;
      } else {
        lop=(searchQuery&&!nodeLabelLC[i].includes(searchQuery))?0.05:0.85;
      }
      if(lop<=0.01) continue;
      ctx.globalAlpha=op*lop;
      ctx.fillStyle=nodeLabelColor[i];
      ctx.fillText(d.label,d.x,d.y+d.radius*S+3);
    }
  }
  ctx.globalAlpha=1;
  ctx.restore();

  _lastHov=hoveredNode?hoveredNode.id:null; _lastScale=scale; _lastTx=tx; _lastTy=ty;
}

function scheduleRedraw(){
  markDirty();
  if(!rafId) rafId=requestAnimationFrame(draw);
}

const opTgt=new Float32Array(nodes.length).fill(0);
let animating=false;
function tickOpacity(){
  let moving=false;
  for(let i=0;i<nodes.length;i++){
    const d=opTgt[i]-nodeOpacity[i];
    if(Math.abs(d)>0.01){nodeOpacity[i]+=d*0.12;moving=true;}
    else nodeOpacity[i]=opTgt[i];
  }
  markDirty();
  scheduleRedraw();
  if(moving) requestAnimationFrame(tickOpacity);
  else animating=false;
}
function setOpTgt(){
  for(let i=0;i<nodes.length;i++) opTgt[i]=visSet.has(nodes[i].id)?0.9:0;
  if(!animating){animating=true;requestAnimationFrame(tickOpacity);}
}

function stopSim(){
  if(refitTimer){clearTimeout(refitTimer);refitTimer=null;}
  simRunning=false;sim.stop();sim.on("tick.r",null).on("end.r",null);
}

function refitVis(){
  if(refitTimer) clearTimeout(refitTimer);
  refitTimer=setTimeout(()=>{
    const vis=getVisibleSet(); if(!vis.size) return;
    stopSim();
    for(const d of nodes){d.fx=null;d.fy=null;}
    if(activeCat==="all"){
      const ep=nodeMap.get("epstein");
      if(ep){ep.fx=W/2;ep.fy=H/2;ep.x=W/2;ep.y=H/2;}
    }
    const cx=W/2,cy=H/2,vc=vis.size;
    /* Scale repulsion based on how many nodes are visible */
    const chargeStr=vc<10?-380:vc<20?-300:vc<40?-260:-220;
    const collRad=vc<20?14:vc<40?12:10;
    const linkDist=vc<20?90:vc<40?75:60;
    const centerStr=vc<15?0.09:vc<40?0.07:0.035;
    sim.force("link",d3.forceLink(links).id(d=>d.id)
        .distance(d=>vis.has(typeof d.source==='object'?d.source.id:d.source)&&vis.has(typeof d.target==='object'?d.target.id:d.target)?linkDist+((1-(d.strength||0.5))*100):0)
        .strength(d=>{
          const sid=typeof d.source==='object'?d.source.id:d.source;
          const tid=typeof d.target==='object'?d.target.id:d.target;
          return vis.has(sid)&&vis.has(tid)?(d.strength||0.5)*0.45:0;
        }))
       .force("center",d3.forceCenter(cx,cy).strength(0.06))
       .force("charge",d3.forceManyBody().strength(d=>vis.has(d.id)?chargeStr:0).distanceMin(15).distanceMax(600))
       .force("collision",d3.forceCollide().radius(d=>vis.has(d.id)?(d.radius*S)+collRad:0).strength(0.85).iterations(3))
       .force("x",d3.forceX(cx).strength(d=>vis.has(d.id)?centerStr:0))
       .force("y",d3.forceY(cy).strength(d=>vis.has(d.id)?centerStr:0));
    for(const d of nodes){
      if(!vis.has(d.id)){d.x=cx;d.y=cy;}
    }
    sim.on("tick.r",()=>{markDirty();scheduleRedraw();});
    simRunning=true;
    sim.velocityDecay(0.6).alpha(1).alphaTarget(0).alphaDecay(0.01).restart();
    setTimeout(()=>{
      sim.stop();
      sim.on("tick.r",null).on("end.r",null);
      freezeAllNodes();
      if(activeCat==="all"){
        const ep=nodeMap.get("epstein");
        if(ep){ep.fx=W/2;ep.fy=H/2;}
      }
      restoreForces();scheduleRedraw();
    },5000);
  },80);
}

function applyFilters(){invalidateVis();visSet=getVisibleSet();setOpTgt();updateStats();}
function updateStats(){
  let vl=0;
  for(let i=0;i<links.length;i++) if(lStr[i]>=minStrength&&visSet.has(lSrcIds[i])&&visSet.has(lTgtIds[i])) vl++;
  if(scrambleMode){
    document.getElementById("stats").innerHTML=`${visSet.size} of ${nodes.length} entities · ${vl} of ${links.length} entanglements<br>🎲 Scramble active · All codenames randomized`;
  } else {
    document.getElementById("stats").innerHTML=`${visSet.size} of ${nodes.length} nodes · ${vl} of ${links.length} links<br>Scroll to zoom · Drag to pan · Click for dossier`;
  }
}

const tipEl=document.getElementById("tip");
function toGraph(cx,cy){return{x:(cx-tx)/scale,y:(cy-ty)/scale};}
function hitTest(gx,gy){
  for(let i=nodes.length-1;i>=0;i--){
    const d=nodes[i]; if(!visSet.has(d.id)) continue;
    const r=d.radius*S+2,dx=gx-d.x,dy=gy-d.y;
    if(dx*dx+dy*dy<=r*r) return d;
  }
  return null;
}
function showTip(d,cx,cy){
  const cats=Object.entries(categories).filter(([,v])=>v.includes(d.id)).map(([k])=>catNames[k]);
  const tipColor=nColor(d);
  const displayName=d.label;
  const displayRole=scrambleMode?getDisplayRole(d):(d.role||"");
  const displayStatus=scrambleMode?getDisplayStatus(d):(d.status||"");
  let h=`<div class="name" style="color:${tipColor}">${displayName}</div>`;
  if(displayRole) h+=`<div><span class="lbl">${scrambleMode?"Cover":"Role"}: </span>${displayRole}</div>`;
  if(displayStatus) h+=`<div><span class="lbl">${scrambleMode?"Signal":"Status"}: </span>${displayStatus}</div>`;
  if(cats.length&&!scrambleMode) h+=`<div style="margin-top:4px;color:#64748b;font-size:10px">${cats.join(' · ')}</div>`;
  if(scrambleMode) h+=`<div style="margin-top:4px;color:#f59e0b;font-size:10px">🎲 Identity scrambled</div>`;
  h+=`<div class="hint">${scrambleMode?"Click to decode dossier →":"Click to open dossier →"}</div>`;
  tipEl.innerHTML=h; tipEl.style.display="block";
  tipEl.style.transform=`translate3d(${cx+14}px,${cy-10}px,0)`;
}

let isPanning=false,panSX=0,panSY=0,panSTx=0,panSTy=0;
let dragNode=null,dragSX=0,dragSY=0,mdX=0,mdY=0,mdT=0;

canvas.addEventListener("mousedown",e=>{
  if(e.button!==0) return;
  mdX=e.clientX;mdY=e.clientY;mdT=Date.now();
  const g=toGraph(e.clientX,e.clientY),hit=hitTest(g.x,g.y);
  if(hit){
    dragNode=hit;dragSX=e.clientX;dragSY=e.clientY;
    hit.fx=hit.x;hit.fy=hit.y;
  }
  else{isPanning=true;panSX=e.clientX;panSY=e.clientY;panSTx=tx;panSTy=ty;}
});
canvas.addEventListener("mousemove",e=>{
  if(dragNode){
    const g=toGraph(e.clientX,e.clientY);
    dragNode.fx=dragNode.x=g.x;
    dragNode.fy=dragNode.y=g.y;
    scheduleRedraw();
    return;
  }
  if(isPanning){tx=panSTx+(e.clientX-panSX);ty=panSTy+(e.clientY-panSY);scheduleRedraw();return;}
  const g=toGraph(e.clientX,e.clientY),hit=hitTest(g.x,g.y);
  if(hit!==hoveredNode){hoveredNode=hit;scheduleRedraw();}
  if(hit){showTip(hit,e.clientX,e.clientY);canvas.style.cursor="pointer";}
  else{tipEl.style.display="none";canvas.style.cursor="default";}
});
canvas.addEventListener("mouseup",e=>{
  if(dragNode){
    const moved=Math.hypot(e.clientX-dragSX,e.clientY-dragSY),elapsed=Date.now()-mdT;
    if(moved<5&&elapsed<300) openDossier(dragNode);
    dragNode.fx=null;dragNode.fy=null;
    if(dragNode.id==="epstein"&&activeCat==="all"){dragNode.fx=W/2;dragNode.fy=H/2;}
    dragNode=null;
    scheduleRedraw();
  }
  if(isPanning){
    isPanning=false;
    if(Math.hypot(e.clientX-mdX,e.clientY-mdY)<5) document.getElementById("dos").classList.remove("open");
  }
});
canvas.addEventListener("mouseleave",()=>{
  if(dragNode){
    dragNode.fx=null;dragNode.fy=null;
    if(dragNode.id==="epstein"&&activeCat==="all"){dragNode.fx=W/2;dragNode.fy=H/2;}
    dragNode=null;
  }
  hoveredNode=null;isPanning=false;tipEl.style.display="none";scheduleRedraw();
});
canvas.addEventListener("wheel",e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.05:0.9524,ns=Math.max(0.1,Math.min(8,scale*f));
  tx=e.clientX-(e.clientX-tx)*(ns/scale);ty=e.clientY-(e.clientY-ty)*(ns/scale);scale=ns;
  syncZoomSlider();
  scheduleRedraw();
},{passive:false});

let ltd=0,tpx=0,tpy=0;
canvas.addEventListener("touchstart",e=>{
  if(e.touches.length===2) ltd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  else{tpx=e.touches[0].clientX;tpy=e.touches[0].clientY;panSTx=tx;panSTy=ty;}
},{passive:true});
canvas.addEventListener("touchmove",e=>{
  e.preventDefault();
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const f=d/ltd,mx=(e.touches[0].clientX+e.touches[1].clientX)/2,my=(e.touches[0].clientY+e.touches[1].clientY)/2;
    const ns=Math.max(0.1,Math.min(8,scale*f));
    tx=mx-(mx-tx)*(ns/scale);ty=my-(my-ty)*(ns/scale);scale=ns;ltd=d;
    syncZoomSlider();
  } else {tx=panSTx+(e.touches[0].clientX-tpx);ty=panSTy+(e.touches[0].clientY-tpy);}
  scheduleRedraw();
},{passive:false});

document.getElementById("search").addEventListener("input",e=>{
  searchQuery=e.target.value.toLowerCase();
  if(searchQuery.length>=2){const m=nodes.find(n=>visSet.has(n.id)&&nodeLabelLC[nodes.indexOf(n)].includes(searchQuery));if(m)hoveredNode=m;}
  else hoveredNode=null;
  invalidateVis();visSet=getVisibleSet();scheduleRedraw();
});

function openDossier(d){
  tipEl.style.display="none";
  const color=nColor(d),light=Clight[d.type]||"rgba(59,130,246,0.1)",border=Cborder[d.type]||"rgba(59,130,246,0.25)";

  document.getElementById("dos-name").style.color=color;

    } else {
      const dead=/DECEASED|DIED/.test(displayStatus),conv=/CONVICTED/.test(displayStatus),fled=/FLED/.test(displayStatus),imm=/IMMUNITY/.test(displayStatus);
      stEl.style.background=dead?"rgba(100,116,139,0.1)":conv?"rgba(248,113,113,0.1)":fled?"rgba(251,146,60,0.1)":imm?"rgba(250,204,21,0.1)":light;
      stEl.style.color=dead?"#64748b":conv?"#f87171":fled?"#fb923c":imm?"#facc15":color;
      stEl.style.border="1px solid "+(dead?"rgba(100,116,139,0.2)":conv?"rgba(248,113,113,0.2)":fled?"rgba(251,146,60,0.2)":imm?"rgba(250,204,21,0.2)":border);
    }
  } else stEl.style.display="none";
  const nwEl=document.getElementById("dos-nw");
  if(scrambleMode){
    const fakeNW=["∞ Stardust","42 Quatloos","₿ NaN","$0.69","π Zorkmids","1M Galactic Credits","0xDEADBEEF","420.69 Doge"][Math.abs(hashStr(d.id+"nw"))%8];
    nwEl.textContent=fakeNW;nwEl.style.display="inline-block";
  } else {
    nwEl.textContent=d.networth||"";nwEl.style.display=d.networth?"inline-block":"none";
  }

  const body=document.getElementById("dos-body"),parts=[];

  if(scrambleMode){
    parts.push(`<div class="cal" style="background:rgba(245,158,11,0.08);border-left-color:#f59e0b;color:#fbbf24;margin-bottom:14px">🎲 SCRAMBLE MODE ACTIVE — All identifiers randomized. Real identity redacted.</div>`);
  }

  if(!scrambleMode&&categories.uncertain.includes(d.id)&&!categories.named.includes(d.id)) parts.push(`<div class="cal gray" style="margin-bottom:14px">⚠ Documented connection — role uncertain.</div>`);
  if(d.intelRole)   parts.push(`<div class="ds"><h3>${scrambleMode?"Astral Assessment":"Intel Assessment"}</h3><div class="cal red">${scrambleMode?scrambleText(d.intelRole):d.intelRole}</div></div>`);
  if(d.epsteinLink) parts.push(`<div class="ds"><h3>${scrambleMode?"Nexus Entanglement":"Epstein Connection"}</h3><div class="cal">${scrambleMode?scrambleText(d.epsteinLink):d.epsteinLink}</div></div>`);
  if(d.significance)parts.push(`<div class="ds"><h3>${scrambleMode?"Cosmic Significance":"Why This Matters"}</h3><div class="cal blue">${scrambleMode?scrambleText(d.significance):d.significance}</div></div>`);
  if(d.desc)        parts.push(`<div class="ds"><h3>${scrambleMode?"Decoded Transmission":"Summary"}</h3><p>${scrambleMode?scrambleText(d.desc):d.desc}</p></div>`);
  if(d.evidence)    parts.push(`<div class="ds"><h3>${scrambleMode?"Intercepted Data":"Evidence"}</h3><p>${scrambleMode?scrambleText(d.evidence):d.evidence}</p></div>`);
  if(d.link)        parts.push(`<div class="ds"><h3>${scrambleMode?"Oracle Note":"Analyst Note"}</h3><p style="color:#64748b;font-style:italic">${scrambleMode?scrambleText(d.link):d.link}</p></div>`);
  const nodeCats=Object.entries(categories).filter(([,v])=>v.includes(d.id)).map(([k])=>k);
  if(nodeCats.length) parts.push(`<div class="ds"><h3>${scrambleMode?"Dimensional Role":"Network Role"}</h3><div>${nodeCats.map(c=>`<span class="ctag">${scrambleMode?scrambleCatName(c):catNames[c]}</span>`).join("")}</div></div>`);
  const txt=[(d.desc||""),(d.evidence||""),(d.epsteinLink||""),(d.intelRole||"")].join(" ");
  const ym=[...new Set((txt.match(/\b(19[6-9]\d|20[0-3]\d)\b/g)||[]))].map(Number).sort((a,b)=>a-b);
  const scrambledType=scrambleMode?["OMEGA ENTITY","GAMMA ASSET","DELTA VECTOR","SIGMA NODE"][Math.abs(hashStr(d.id+"t"))%4]:(typeLabel[d.type]||d.type);
  parts.push(`<div class="ds"><h3>${scrambleMode?"Entity Profile":"Profile"}</h3>
    <div class="df"><div class="fl">${scrambleMode?"CODEX":"ID"}</div><div class="fv" style="font-family:monospace;color:${color}">${scrambleMode?("0x"+Math.abs(hashStr(d.id)).toString(16).toUpperCase().padStart(8,"0")):d.id.toUpperCase()}</div></div>
    <div class="df"><div class="fl">${scrambleMode?"Threat Class":"Classification"}</div><div class="fv">${scrambledType}</div></div>
    ${(!scrambleMode&&d.networth)?`<div class="df"><div class="fl">Net Worth</div><div class="fv">${d.networth}</div></div>`:""}
    ${ym.length>=2&&!scrambleMode?`<div class="df"><div class="fl">Years</div><div class="fv">${ym[0]}–${ym[ym.length-1]}</div></div>`:""}</div>`);
  const conns=[];
  for(const l of links){
    const sid=l.source.id||l.source,tid=l.target.id||l.target;
    if(sid===d.id){const t2=nodeMap.get(tid);if(t2)conns.push({node:t2,strength:l.strength||0.5,dir:"→"});}
    if(tid===d.id){const s2=nodeMap.get(sid);if(s2)conns.push({node:s2,strength:l.strength||0.5,dir:"←"});}
  }
  conns.sort((a,b)=>b.strength-a.strength);
  parts.push(`<div class="ds"><h3>${scrambleMode?"Entanglements":"Connections"} (${conns.length})</h3><ul class="cl">${conns.map(c=>{
    const sc=c.strength>=0.7?"sh":c.strength>=0.4?"sm":"sl";
    const connLabel=c.node.label;
    return `<li data-id="${c.node.id}"><span class="cn"><span style="color:${nColor(c.node)}">●</span> ${c.dir} ${connLabel}</span><span class="cs ${sc}">${Math.round(c.strength*100)}%</span></li>`;
  }).join("")}</ul></div>`);
  const tl=d.type==="center"?"CRITICAL":d.type==="convicted"?"HIGH":coreSet.has(d.id)?"HIGH":conns.length>10?"ELEVATED":conns.length>5?"MODERATE":"LOW";
  const scrambledThreat=scrambleMode?["SUPERNOVA","HYPERCRITICAL","SPICY","MEH","CHILL"][Math.abs(hashStr(d.id+"th"))%5]:tl;
  const tC={CRITICAL:"#f87171",HIGH:"#fb923c",ELEVATED:"#fbbf24",MODERATE:"#818cf8",LOW:"#475569",SUPERNOVA:"#f87171",HYPERCRITICAL:"#fb923c",SPICY:"#fbbf24",MEH:"#818cf8",CHILL:"#475569"};
  const tB={CRITICAL:"rgba(248,113,113,0.1)",HIGH:"rgba(251,146,60,0.1)",ELEVATED:"rgba(251,191,36,0.1)",MODERATE:"rgba(129,140,248,0.1)",LOW:"rgba(71,85,105,0.1)",SUPERNOVA:"rgba(248,113,113,0.1)",HYPERCRITICAL:"rgba(251,146,60,0.1)",SPICY:"rgba(251,191,36,0.1)",MEH:"rgba(129,140,248,0.1)",CHILL:"rgba(71,85,105,0.1)"};
  parts.push(`<div class="ds"><h3>${scrambleMode?"Threat Vibe":"Assessment"}</h3><span class="tb" style="background:${tB[scrambledThreat]||tB.LOW};color:${tC[scrambledThreat]||tC.LOW};border:1px solid ${(tC[scrambledThreat]||tC.LOW)}30">${scrambledThreat}</span><div style="margin-top:7px;color:#475569;font-size:11px">${conns.length} ${scrambleMode?"entanglements":"connections"} · ${scrambleMode?"power":"weight"}: ${d.radius}</div></div>`);
  body.innerHTML=parts.join("");
  body.querySelector(".cl")?.addEventListener("click",e=>{
    const li=e.target.closest("li[data-id]");if(!li) return;
    const t2=nodeMap.get(li.dataset.id);if(t2)openDossier(t2);
  });
  document.getElementById("dos").classList.add("open");
}

function scrambleText(text){
  if(!text) return text;
  let out=text;
  for(const n of nodes){
    const real=realLabelBackup.get(n.id);
    const code=scrambleMap.get(n.id);
    if(real&&code){
      out=out.replace(new RegExp(real.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),code);
    }
  }
  return out;
}
