const typeLabel={center:"PRINCIPAL TARGET",convicted:"CONVICTED",suspicious:"SUSPICIOUS - UNDER REVIEW",possibly:"POSSIBLY INVOLVED"};
const coreSet=new Set(categories.operational);
const confirmedSet=new Set(categories.confirmed);
const forceBlue=new Set(["staley","wexner","barr_d","rodriguez","alessi","robert_maxwell"]);

/* ── CANVAS SETUP ── */
const canvas = document.getElementById('graph');
const ctx = canvas.getContext('2d');
const W = window.innerWidth, H = window.innerHeight;
canvas.width = W * devicePixelRatio;
canvas.height = H * devicePixelRatio;
canvas.style.width = W + 'px';
canvas.style.height = H + 'px';
ctx.scale(devicePixelRatio, devicePixelRatio);

/* ── ZOOM / PAN STATE ── */
let tx = 0, ty = 0, scale = 1;

/* ── DATA ── */
const nodes = graphData.nodes.map(d => ({...d}));
const links = graphData.links.map(d => ({...d}));
const nodeMap = new Map(nodes.map(n => [n.id, n]));
const S = 0.55;

/* Pre-cache link src/tgt after forceLink resolves them */
const linkSrcIds = links.map(l => typeof l.source === 'object' ? l.source.id : l.source);
const linkTgtIds = links.map(l => typeof l.target === 'object' ? l.target.id : l.target);
const linkStrengths = new Float32Array(links.map(l => l.strength||0.5));

/* Adjacency index */
const adjIndex = new Map();
for (const n of nodes) adjIndex.set(n.id, new Set([n.id]));

/* ── SIMULATION ── */
const sim = d3.forceSimulation(nodes)
  .force("link",      d3.forceLink(links).id(d=>d.id).distance(d=>100/(d.strength||0.5)).strength(d=>d.strength||0.5))
  .force("charge",    d3.forceManyBody().strength(d=>-(d.radius*S)*18))
  .force("center",    d3.forceCenter(W/2, H/2))
  .force("collision", d3.forceCollide().radius(d=>(d.radius*S)+4))
  .force("x",         d3.forceX(W/2).strength(0.02))
  .force("y",         d3.forceY(H/2).strength(0.02))
  .stop();

for (let i = 0; i < 300; i++) sim.tick();

/* Build adjacency after forceLink resolves objects */
for (const l of links) {
  const s = l.source.id||l.source, t = l.target.id||l.target;
  adjIndex.get(s)?.add(t);
  adjIndex.get(t)?.add(s);
  /* Update cached IDs after forceLink resolves */
  linkSrcIds[links.indexOf(l)] = s;
  linkTgtIds[links.indexOf(l)] = t;
}

/* Save original positions */
nodes.forEach(d => { d._ox = d.x; d._oy = d.y; d.fx = d.x; d.fy = d.y; });

/* ── FILTER STATE ── */
let activeCat = "all";
let _visCache = null;
let visSet = new Set(); /* current visible set — used by draw loop */
let hoveredNode = null;
let searchQuery = "";
let showLabels = true;
let minStrength = 0;
let showOrphans = true;

/* Node opacity targets for smooth fade */
const nodeOpacity = new Float32Array(nodes.length).fill(0);
const nodeLabelLC = nodes.map(n => n.label.toLowerCase());

function invalidateVis() { _visCache = null; }

function getVisibleSet() {
  if (_visCache) return _visCache;
  const at = new Set();
  document.querySelectorAll(".tf").forEach(el => { if(el.checked) at.add(el.value); });
  const catSet = activeCat !== "all" ? new Set(categories[activeCat]||[]) : null;
  let linkedSet = null;
  if (!showOrphans) {
    linkedSet = new Set();
    for (let i = 0; i < links.length; i++) {
      if (linkStrengths[i] >= minStrength) {
        linkedSet.add(linkSrcIds[i]);
        linkedSet.add(linkTgtIds[i]);
      }
    }
  }
  const vis = new Set();
  for (const d of nodes) {
    if (!at.has(d.type)) continue;
    if (catSet && !catSet.has(d.id)) continue;
    if (linkedSet && !linkedSet.has(d.id)) continue;
    vis.add(d.id);
  }
  _visCache = vis;
  return vis;
}

/* ── DRAW LOOP ── */
let rafId = null;
let pulseT = 0; /* for pulse ring animation */

function nodeColor(d) {
  if (forceBlue.has(d.id)) return "#60a5fa";
  if (confirmedSet.has(d.id)) return "#ef4444";
  return C[d.type] || "#64748b";
}

function draw() {
  rafId = null;
  pulseT += 0.016;

  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  ctx.clearRect(0, 0, W, H);

  /* Apply zoom/pan */
  ctx.save();
  ctx.translate(tx, ty);
  ctx.scale(scale, scale);

  const conn = hoveredNode ? (adjIndex.get(hoveredNode.id) || new Set()) : null;

  /* ── LINKS ── */
  for (let i = 0; i < links.length; i++) {
    const l = links[i];
    const s = l.source, t = l.target;
    const sid = s.id||s, tid = t.id||t;
    if (!visSet.has(sid) || !visSet.has(tid)) continue;
    if (linkStrengths[i] < minStrength) continue;

    const str = linkStrengths[i];
    let alpha = 0.4;
    if (conn) {
      alpha = (sid === hoveredNode.id || tid === hoveredNode.id) ? 0.85 : 0.04;
    }

    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(t.x, t.y);
    ctx.lineWidth = Math.max(0.5, str * 2.5);
    if (str >= 0.8) ctx.strokeStyle = `rgba(239,68,68,${alpha})`;
    else if (str >= 0.6) ctx.strokeStyle = `rgba(251,146,60,${alpha})`;
    else if (str >= 0.4) ctx.strokeStyle = `rgba(100,116,139,${alpha})`;
    else ctx.strokeStyle = `rgba(100,116,139,${alpha * 0.5})`;
    ctx.stroke();
  }

  /* ── NODES ── */
  for (let i = 0; i < nodes.length; i++) {
    const d = nodes[i];
    if (!visSet.has(d.id)) continue;

    const op = nodeOpacity[i];
    if (op <= 0.01) continue;

    const r = d.radius * S;
    const color = nodeColor(d);
    const dimmed = conn && !conn.has(d.id);
    const finalOp = dimmed ? op * 0.12 : op;

    ctx.globalAlpha = finalOp;

    /* Pulse ring for center nodes */
    if (d.type === "center") {
      const pulse = 0.1 + 0.1 * Math.sin(pulseT * 2 + i);
      ctx.beginPath();
      ctx.arc(d.x, d.y, r + 6, 0, Math.PI * 2);
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.globalAlpha = finalOp * pulse;
      ctx.stroke();
      ctx.globalAlpha = finalOp;
    }

    /* Node circle */
    ctx.beginPath();
    ctx.arc(d.x, d.y, r, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.strokeStyle = forceBlue.has(d.id) ? "rgba(96,165,250,0.4)"
                    : confirmedSet.has(d.id) ? "rgba(239,68,68,0.4)"
                    : "rgba(255,255,255,0.15)";
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  ctx.globalAlpha = 1;

  /* ── LABELS ── */
  if (showLabels) {
    ctx.font = `500 9px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "top";

    for (let i = 0; i < nodes.length; i++) {
      const d = nodes[i];
      if (!visSet.has(d.id)) continue;
      const op = nodeOpacity[i];
      if (op <= 0.01) continue;

      const dimmed = conn && !conn.has(d.id);
      const searchDimmed = searchQuery && !nodeLabelLC[i].includes(searchQuery);
      let labelOp = dimmed ? 0.08 : (searchDimmed ? 0.08 : 1.0);
      ctx.globalAlpha = op * labelOp;

      const lx = d.x + (d._lx || 0);
      const ly = d.y + (d._ly || d.radius * S + 4);

      ctx.fillStyle = forceBlue.has(d.id) ? "#93c5fd"
                    : confirmedSet.has(d.id) ? "#fca5a5"
                    : "#94a3b8";
      ctx.fillText(d.label, lx, ly);
    }
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

function scheduleRedraw() {
  if (!rafId) rafId = requestAnimationFrame(draw);
}

/* ── OPACITY ANIMATION ── */
/* Instead of CSS transitions, we animate opacity values in JS
   and redraw every frame until all targets are reached. */
const opacityTargets = new Float32Array(nodes.length);
let animating = false;
let animRafId = null;

function tickOpacity() {
  animRafId = null;
  let stillMoving = false;
  for (let i = 0; i < nodes.length; i++) {
    const diff = opacityTargets[i] - nodeOpacity[i];
    if (Math.abs(diff) > 0.01) {
      nodeOpacity[i] += diff * 0.12; /* ease factor */
      stillMoving = true;
    } else {
      nodeOpacity[i] = opacityTargets[i];
    }
  }
  draw();
  if (stillMoving) animRafId = requestAnimationFrame(tickOpacity);
  else animating = false;
}

function setOpacityTargets() {
  for (let i = 0; i < nodes.length; i++) {
    opacityTargets[i] = visSet.has(nodes[i].id) ? 0.9 : 0;
  }
  if (!animating) {
    animating = true;
    animRafId = requestAnimationFrame(tickOpacity);
  }
}

/* ── LABEL PLACEMENT ── */
function placeLabels(vis) {
  const LH = 11, PAD = 3, charW = 5.8;
  const placed = [];
  const angles = [Math.PI*0.5, 0, Math.PI, -Math.PI*0.5, Math.PI*0.25, Math.PI*0.75, -Math.PI*0.25, -Math.PI*0.75];
  const active = vis || visSet;

  for (let i = 0; i < nodes.length; i++) {
    const d = nodes[i];
    if (!active.has(d.id)) continue;
    const r = d.radius * S + 4 + PAD;
    const lw = d.label.length * charW;
    let bestScore = Infinity, bestDx = 0, bestDy = r + LH * 0.5;
    for (const ang of angles) {
      const dist = r + LH * 0.5 + PAD;
      const cx = d.x + Math.cos(ang) * dist;
      const cy = d.y + Math.sin(ang) * dist;
      const ax = cx - lw/2, ay = cy - LH/2, ar = cx + lw/2, ab = cy + LH/2;
      let score = 0;
      for (let j = 0; j < nodes.length; j++) {
        if (!active.has(nodes[j].id)) continue;
        const nr = nodes[j].radius * S + PAD;
        const clx = Math.max(ax, Math.min(ar, nodes[j].x));
        const cly = Math.max(ay, Math.min(ab, nodes[j].y));
        const dx = nodes[j].x - clx, dy = nodes[j].y - cly;
        if (dx*dx + dy*dy < nr*nr) score += 100;
      }
      for (const p of placed) {
        if (ar > p.ax && ax < p.ar && ab > p.ay && ay < p.ab) score += 50;
      }
      if (score < bestScore) {
        bestScore = score;
        bestDx = cx - d.x;
        bestDy = cy - d.y;
        if (score === 0) break;
      }
    }
    d._lx = bestDx;
    d._ly = bestDy;
    placed.push({ ax: d.x+bestDx-lw/2, ay: d.y+bestDy-LH/2, ar: d.x+bestDx+lw/2, ab: d.y+bestDy+LH/2 });
  }
}

/* ── CAMERA ── */
function panTo(targetTx, targetTy, targetScale, duration) {
  const startTx = tx, startTy = ty, startScale = scale;
  const startTime = performance.now();
  function step(now) {
    const t = Math.min((now - startTime) / duration, 1);
    const ease = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
    tx = startTx + (targetTx - startTx) * ease;
    ty = startTy + (targetTy - startTy) * ease;
    scale = startScale + (targetScale - startScale) * ease;
    scheduleRedraw();
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function centerOnEpstein() {
  const ep = nodes.find(d => d.id === "epstein");
  if (!ep) return;
  const s = 1.1;
  panTo(W/2 - ep._ox * s, H/2 - ep._oy * s, s, 700);
}

function centerOnVisible(vis) {
  const active = vis || visSet;
  const visNodes = nodes.filter(d => active.has(d.id));
  if (!visNodes.length) return;
  let x0=Infinity,y0=Infinity,x1=-Infinity,y1=-Infinity;
  for (const d of visNodes) {
    const r = d.radius * S;
    if (d.x-r < x0) x0=d.x-r; if (d.y-r < y0) y0=d.y-r;
    if (d.x+r > x1) x1=d.x+r; if (d.y+r > y1) y1=d.y+r;
  }
  const pad=80, bw=x1-x0+pad*2, bh=y1-y0+pad*2;
  const s = Math.min(W/bw, H/bh, 2.5);
  panTo(W/2 - (x0+x1)/2*s, H/2 - (y0+y1)/2*s, s, 650);
}

/* ── SIMULATION CONTROL ── */
let simRunning = false, refitTimer = null;

function restoreDefaultForces() {
  sim.force("center", d3.forceCenter(W/2,H/2))
     .force("x", d3.forceX(W/2).strength(0.02))
     .force("y", d3.forceY(H/2).strength(0.02))
     .force("charge", d3.forceManyBody().strength(d=>-(d.radius*S)*18))
     .force("collision", d3.forceCollide().radius(d=>(d.radius*S)+4));
}

function freezeSimulation() {
  if (refitTimer) { clearTimeout(refitTimer); refitTimer = null; }
  sim.stop(); simRunning = false;
  sim.on("tick.refit", null).on("end.refit", null).on("tick", null);
  for (const d of nodes) { d.x=d._ox; d.y=d._oy; d.fx=d._ox; d.fy=d._oy; }
  placeLabels(null);
  centerOnEpstein();
}

function unfreezeNodes() { for (const d of nodes) { d.fx=null; d.fy=null; } }

function isFullView() { return activeCat === "all"; }

function refitVisibleNodes() {
  if (refitTimer) clearTimeout(refitTimer);
  refitTimer = setTimeout(() => {
    if (!visSet.size) return;
    if (simRunning) { sim.stop(); simRunning = false; }
    unfreezeNodes();
    centerOnVisible(visSet);
    const panelW = 284+32, cx = panelW+(W-panelW)/2, cy = H/2;
    sim.force("center", d3.forceCenter(cx,cy).strength(1))
       .force("x", d3.forceX().x(d => visSet.has(d.id)?cx:d.x).strength(d => visSet.has(d.id)?0.15:0))
       .force("y", d3.forceY().y(d => visSet.has(d.id)?cy:d.y).strength(d => visSet.has(d.id)?0.15:0))
       .force("charge", d3.forceManyBody().strength(d => visSet.has(d.id)?-(d.radius*S)*22:0))
       .force("collision", d3.forceCollide().radius(d => visSet.has(d.id)?(d.radius*S)+6:0));
    sim.on("tick.refit", scheduleRedraw);
    sim.on("end.refit", () => {
      simRunning = false;
      sim.on("tick.refit",null).on("end.refit",null);
      restoreDefaultForces();
      sim.on("tick", scheduleRedraw);
      placeLabels(visSet);
      centerOnVisible(visSet);
    });
    simRunning = true;
    sim.alpha(0.6).alphaDecay(0.028).alphaTarget(0).restart();
  }, 100);
}

/* ── APPLY FILTERS ── */
function applyFilters() {
  invalidateVis();
  visSet = getVisibleSet();
  setOpacityTargets();
  updateStats();
}

function updateStats() {
  let visL = 0;
  for (let i = 0; i < links.length; i++) {
    if (linkStrengths[i] >= minStrength && visSet.has(linkSrcIds[i]) && visSet.has(linkTgtIds[i])) visL++;
  }
  document.getElementById("stats").innerHTML =
    `${visSet.size} of ${nodes.length} nodes · ${visL} of ${links.length} links<br>Scroll to zoom · Drag to pan<br>Hover to highlight · Click for dossier`;
}

/* ── MOUSE / TOUCH INTERACTION ── */
const tipEl = document.getElementById("tooltip");

/* Convert screen coords to graph coords */
function toGraph(cx, cy) {
  return { x: (cx - tx) / scale, y: (cy - ty) / scale };
}

function hitTest(gx, gy) {
  /* Test nodes in reverse order (last drawn = on top) */
  for (let i = nodes.length - 1; i >= 0; i--) {
    const d = nodes[i];
    if (!visSet.has(d.id)) continue;
    const r = d.radius * S;
    const dx = gx - d.x, dy = gy - d.y;
    if (dx*dx + dy*dy <= r*r) return d;
  }
  return null;
}

function showTooltip(d, clientX, clientY) {
  const nodeCats = Object.entries(categories).filter(([,v])=>v.includes(d.id)).map(([k])=>catNames[k]);
  let h = `<div class="name" style="color:${C[d.type]||'#64748b'}">${d.label}</div>`;
  if (d.agency) h += `<div style="font-size:10px;color:#64748b;margin-bottom:4px">${d.agency}</div>`;
  if (d.role)   h += `<div><span class="lbl">Role: </span>${d.role}</div>`;
  if (d.status) h += `<div><span class="lbl">Status: </span>${d.status}</div>`;
  if (nodeCats.length) h += `<div style="margin-top:5px;color:#64748b;font-size:10px">${nodeCats.join(' · ')}</div>`;
  h += `<div class="hint">Click to open dossier →</div>`;
  tipEl.innerHTML = h;
  tipEl.style.display = "block";
  tipEl.style.transform = `translate3d(${clientX+15}px,${clientY-10}px,0)`;
}

/* Pan/zoom state */
let isPanning = false, panStartX = 0, panStartY = 0, panStartTx = 0, panStartTy = 0;
let dragNode = null, dragStartX = 0, dragStartY = 0;
let mouseDownX = 0, mouseDownY = 0, mouseDownTime = 0;

canvas.addEventListener("mousedown", e => {
  if (e.button !== 0) return;
  mouseDownX = e.clientX; mouseDownY = e.clientY; mouseDownTime = Date.now();
  const g = toGraph(e.clientX, e.clientY);
  const hit = hitTest(g.x, g.y);
  if (hit) {
    dragNode = hit;
    dragStartX = e.clientX; dragStartY = e.clientY;
    if (isFullView()) { hit.fx = null; hit.fy = null; }
    else {
      if (simRunning) { sim.stop(); simRunning=false; sim.on("tick.refit",null).on("end.refit",null); restoreDefaultForces(); }
      sim.alphaTarget(0.3).restart();
      hit.fx = hit.x; hit.fy = hit.y;
    }
  } else {
    isPanning = true;
    panStartX = e.clientX; panStartY = e.clientY;
    panStartTx = tx; panStartTy = ty;
  }
});

canvas.addEventListener("mousemove", e => {
  if (dragNode) {
    const g = toGraph(e.clientX, e.clientY);
    dragNode.fx = g.x; dragNode.fy = g.y;
    dragNode.x  = g.x; dragNode.y  = g.y;
    scheduleRedraw();
    return;
  }
  if (isPanning) {
    tx = panStartTx + (e.clientX - panStartX);
    ty = panStartTy + (e.clientY - panStartY);
    scheduleRedraw();
    return;
  }
  /* Hover hit-test */
  const g = toGraph(e.clientX, e.clientY);
  const hit = hitTest(g.x, g.y);
  if (hit !== hoveredNode) {
    hoveredNode = hit;
    scheduleRedraw();
  }
  if (hit) {
    showTooltip(hit, e.clientX, e.clientY);
    canvas.style.cursor = "pointer";
  } else {
    tipEl.style.display = "none";
    canvas.style.cursor = "default";
  }
});

canvas.addEventListener("mouseup", e => {
  if (dragNode) {
    const moved = Math.hypot(e.clientX - dragStartX, e.clientY - dragStartY);
    const elapsed = Date.now() - mouseDownTime;
    if (moved < 5 && elapsed < 300) openDossier(dragNode);
    if (isFullView()) { dragNode.fx = dragNode.x; dragNode.fy = dragNode.y; }
    else { sim.alphaTarget(0).stop(); dragNode.fx = null; dragNode.fy = null; }
    dragNode = null;
    scheduleRedraw();
  }
  if (isPanning) {
    isPanning = false;
    /* Click on background closes dossier */
    const moved = Math.hypot(e.clientX - mouseDownX, e.clientY - mouseDownY);
    if (moved < 5) document.getElementById("dossier").classList.remove("open");
  }
});

canvas.addEventListener("mouseleave", () => {
  hoveredNode = null; isPanning = false; dragNode = null;
  tipEl.style.display = "none";
  scheduleRedraw();
});

canvas.addEventListener("wheel", e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.91;
  const newScale = Math.max(0.1, Math.min(8, scale * factor));
  /* Zoom toward cursor */
  tx = e.clientX - (e.clientX - tx) * (newScale / scale);
  ty = e.clientY - (e.clientY - ty) * (newScale / scale);
  scale = newScale;
  scheduleRedraw();
}, { passive: false });

/* Touch support */
let lastTouchDist = 0, touchPanX = 0, touchPanY = 0;
canvas.addEventListener("touchstart", e => {
  if (e.touches.length === 2) {
    lastTouchDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
  } else if (e.touches.length === 1) {
    touchPanX = e.touches[0].clientX; touchPanY = e.touches[0].clientY;
    panStartTx = tx; panStartTy = ty;
  }
}, {passive:true});
canvas.addEventListener("touchmove", e => {
  e.preventDefault();
  if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    const factor = d / lastTouchDist;
    const mx = (e.touches[0].clientX+e.touches[1].clientX)/2;
    const my = (e.touches[0].clientY+e.touches[1].clientY)/2;
    const ns = Math.max(0.1, Math.min(8, scale*factor));
    tx = mx - (mx-tx)*(ns/scale); ty = my - (my-ty)*(ns/scale); scale = ns;
    lastTouchDist = d;
  } else if (e.touches.length === 1) {
    tx = panStartTx + (e.touches[0].clientX - touchPanX);
    ty = panStartTy + (e.touches[0].clientY - touchPanY);
  }
  scheduleRedraw();
}, {passive:false});

/* ── DOSSIER ── */
function openDossier(d) {
  tipEl.style.display = "none";
  const color = C[d.type]||"#64748b";
  const light = Clight[d.type]||"rgba(100,116,139,0.1)";
  const border = Cborder[d.type]||"rgba(100,116,139,0.25)";
  const isCore = coreSet.has(d.id);
  document.getElementById("dossier-name").textContent = d.label;
  const agEl = document.getElementById("dossier-agency");
  agEl.textContent = d.agency||""; agEl.style.display = d.agency?"block":"none";
  const roEl = document.getElementById("dossier-role");
  roEl.textContent = d.role||""; roEl.style.display = d.role?"block":"none";
  const statusEl = document.getElementById("dossier-status");
  if (d.status) {
    statusEl.textContent = d.status; statusEl.style.display = "inline-block";
    const isDead=/DECEASED|DIED/.test(d.status), isConv=/CONVICTED/.test(d.status);
    const isFled=/FLED/.test(d.status), isImm=/IMMUNITY/.test(d.status);
    statusEl.style.background = isDead?"rgba(100,116,139,0.1)":isConv?"rgba(248,113,113,0.1)":isFled?"rgba(251,146,60,0.1)":isImm?"rgba(250,204,21,0.1)":light;
    statusEl.style.color = isDead?"#64748b":isConv?"#f87171":isFled?"#fb923c":isImm?"#facc15":color;
    statusEl.style.border = "1px solid "+(isDead?"rgba(100,116,139,0.2)":isConv?"rgba(248,113,113,0.2)":isFled?"rgba(251,146,60,0.2)":isImm?"rgba(250,204,21,0.2)":border);
  } else { statusEl.style.display = "none"; }
  const nwEl = document.getElementById("dossier-networth");
  nwEl.textContent = d.networth||""; nwEl.style.display = d.networth?"inline-block":"none";
  const stamps={center:"TARGET",convicted:"CONVICTED",suspicious:"SUSPECT",possibly:"MONITOR"};
  document.getElementById("dossier-stamp").textContent = stamps[d.type]||"FILE";
  const body = document.getElementById("dossier-body");
  const parts = [];
  if (isCore) parts.push(`<div style="margin-bottom:16px"><span class="core-badge">⬤ OPERATIONAL RING</span></div>`);
  const isUncertain = categories.uncertain.includes(d.id) && !categories.named.includes(d.id);
  if (isUncertain) parts.push(`<div class="dossier-callout gray" style="margin-bottom:16px">⚠ Documented connection — role uncertain.</div>`);
  if (d.intelRole)    parts.push(`<div class="dossier-section"><h3>Intelligence Assessment</h3><div class="dossier-callout red">${d.intelRole}</div></div>`);
  if (d.epsteinLink)  parts.push(`<div class="dossier-section"><h3>Epstein Connection</h3><div class="dossier-callout">${d.epsteinLink}</div></div>`);
  if (d.significance) parts.push(`<div class="dossier-section"><h3>Why This Matters</h3><div class="dossier-callout blue">${d.significance}</div></div>`);
  if (d.desc)         parts.push(`<div class="dossier-section"><h3>Summary</h3><p>${d.desc}</p></div>`);
  if (d.evidence)     parts.push(`<div class="dossier-section"><h3>Evidence</h3><p>${d.evidence}</p></div>`);
  if (d.link)         parts.push(`<div class="dossier-section"><h3>Analyst Note</h3><p style="color:#64748b;font-style:italic">${d.link}</p></div>`);
  const nodeCats = Object.entries(categories).filter(([,v])=>v.includes(d.id)).map(([k])=>k);
  if (nodeCats.length) parts.push(`<div class="dossier-section"><h3>Network Role</h3><div style="display:flex;gap:4px;flex-wrap:wrap">${nodeCats.map(c=>`<span class="cat-tag" style="background:${catColors[c]}">${catNames[c]}</span>`).join("")}</div></div>`);
  parts.push(`<div class="dossier-section"><h3>Profile</h3>
    <div class="dossier-field"><div class="fl">Subject ID</div><div class="fv" style="font-family:ui-monospace,monospace;color:${color}">${d.id.toUpperCase()}</div></div>
    <div class="dossier-field"><div class="fl">Classification</div><div class="fv">${typeLabel[d.type]||d.type}</div></div>
    ${d.networth?`<div class="dossier-field"><div class="fl">Net Worth</div><div class="fv">${d.networth}</div></div>`:""}</div>`);
  const conns = [];
  for (const l of links) {
    const sid=l.source.id||l.source, tid=l.target.id||l.target;
    if (sid===d.id) { const t=nodeMap.get(tid); if(t) conns.push({node:t,strength:l.strength||0.5,direction:"→"}); }
    if (tid===d.id) { const s=nodeMap.get(sid); if(s) conns.push({node:s,strength:l.strength||0.5,direction:"←"}); }
  }
  conns.sort((a,b)=>b.strength-a.strength);
  parts.push(`<div class="dossier-section"><h3>Connections (${conns.length})</h3><ul class="conn-list">${
    conns.map(c=>{
      const sc=c.strength>=0.7?"str-high":c.strength>=0.4?"str-med":"str-low";
      const opTag=coreSet.has(c.node.id)?` <span style="color:#f87171;font-size:8px">●</span>`:"";
      return `<li data-id="${c.node.id}"><span class="conn-name"><span style="color:${C[c.node.type]||'#64748b'}">●</span> ${c.direction} ${c.node.label}${opTag}</span><span class="conn-strength ${sc}">${Math.round(c.strength*100)}%</span></li>`;
    }).join("")
  }</ul></div>`);
  const threatLevel=d.type==="center"?"CRITICAL":d.type==="convicted"?"HIGH":isCore?"HIGH":conns.length>10?"ELEVATED":conns.length>5?"MODERATE":"LOW";
  const tC={CRITICAL:"#f87171",HIGH:"#fb923c",ELEVATED:"#fbbf24",MODERATE:"#818cf8",LOW:"#475569"};
  const tB={CRITICAL:"rgba(248,113,113,0.1)",HIGH:"rgba(251,146,0.1)",ELEVATED:"rgba(251,191,36,0.1)",MODERATE:"rgba(129,140,248,0.1)",LOW:"rgba(71,85,105,0.1)"};
  parts.push(`<div class="dossier-section"><h3>Assessment</h3>
    <span class="threat-badge" style="background:${tB[threatLevel]};color:${tC[threatLevel]};border:1px solid ${tC[threatLevel]}30">${threatLevel}</span>
    <div style="margin-top:8px;color:#475569;font-size:11px">${conns.length} direct connections · Network weight: ${d.radius}</div></div>`);
  parts.push(`<div style="margin-top:24px;padding-top:12px;border-top:1px solid #334155;color:#334155;font-size:9px;text-align:center;letter-spacing:0.5px">FILE REF: EP-NET-${d.id.toUpperCase()} · CLASSIFICATION: RESTRICTED</div>`);
  body.innerHTML = parts.join("");
  body.querySelector(".conn-list")?.addEventListener("click", e => {
    const li = e.target.closest("li[data-id]");
    if (!li) return;
    const t = nodeMap.get(li.dataset.id);
    if (t) { body.scrollTop=0; openDossier(t); }
  });
  document.getElementById("dossier").classList.add("open");
  document.getElementById("dossier").scrollTop = 0;
}

document.getElementById("dossier-close").addEventListener("click", () => document.getElementById("dossier").classList.remove("open"));

/* ── EVENT WIRING ── */
document.querySelectorAll("#cat-buttons .cat-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("#cat-buttons .cat-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    activeCat = btn.dataset.cat;
    if (isFullView()) freezeSimulation();
    applyFilters();
    if (!isFullView()) refitVisibleNodes();
  });
});

document.getElementById("search").addEventListener("input", function() {
  searchQuery = this.value.toLowerCase();
  scheduleRedraw();
}, {passive:true});

document.querySelectorAll(".tf").forEach(el => el.addEventListener("change", () => {
  if (isFullView()) freezeSimulation();
  applyFilters();
  if (!isFullView()) refitVisibleNodes();
}));

document.getElementById("str").addEventListener("input", function() {
  document.getElementById("sv").textContent = this.value;
  minStrength = +this.value;
  if (isFullView()) freezeSimulation();
  applyFilters();
  if (!isFullView()) refitVisibleNodes();
}, {passive:true});

document.getElementById("labels").addEventListener("change", function() {
  showLabels = this.checked; scheduleRedraw();
});

document.getElementById("orphans").addEventListener("change", function() {
  showOrphans = this.checked;
  if (isFullView()) freezeSimulation();
  applyFilters();
  if (!isFullView()) refitVisibleNodes();
});

/* ── WRITEUP SYSTEM ── */
function renderWriteup(key) {
  const w = (typeof WRITEUPS !== 'undefined') && WRITEUPS[key];
  if (!w) return;
  const parts = [`<div class="writeup-header"><div class="writeup-title">${w.title}</div><div class="writeup-subtitle">${w.subtitle}</div></div>`];
  w.sections.forEach(s => {
    parts.push(`<div class="writeup-section${s.closing?' writeup-closing':''}">`);
    if (s.title) parts.push(`<div class="writeup-section-title">${s.title}</div>`);
    s.content.forEach(c => { parts.push(c.type==="pullquote"?`<div class="writeup-pullquote"><p>${c.text}</p></div>`:`<p>${c.text}</p>`); });
    parts.push(`</div>`);
  });
  document.getElementById("writeup-content").innerHTML = parts.join("");
  document.getElementById("writeup-overlay").classList.add("visible");
  document.getElementById("writeup-close").style.display = "block";
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  document.querySelector(`.nav-btn[data-writeup="${key}"]`)?.classList.add("active");
}
function closeWriteup() {
  document.getElementById("writeup-overlay").classList.remove("visible");
  document.getElementById("writeup-close").style.display = "none";
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
}
document.querySelectorAll(".nav-btn[data-writeup]").forEach(btn => {
  btn.addEventListener("click", () => renderWriteup(btn.dataset.writeup));
});

/* ── INIT ── */
applyFilters();
requestAnimationFrame(() => {
  placeLabels(null);
  centerOnEpstein();
});
sim.on("tick", scheduleRedraw);
</script>
</body>
</html>
