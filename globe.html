*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#060a12;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#e2e8f0}

#app{position:fixed;inset:0;display:flex}

/* ── sidebar ── */
#sidebar{width:240px;flex-shrink:0;background:rgba(6,10,18,.97);border-right:1px solid #0f172a;display:flex;flex-direction:column;z-index:10}
#sb-inner{flex:1;overflow-y:auto;padding:14px 13px 24px;scrollbar-width:thin;scrollbar-color:#0f172a transparent}
#sb-inner::-webkit-scrollbar{width:3px}
#sb-inner::-webkit-scrollbar-thumb{background:#0f172a}

h1{font-size:13px;font-weight:700;color:#f1f5f9;letter-spacing:.3px;margin-bottom:1px}
.sub{font-size:10px;color:#1e293b;margin-bottom:11px}
#search{width:100%;padding:7px 10px;background:#0a0f1a;border:1px solid #0f172a;border-radius:5px;color:#e2e8f0;font-size:12px;outline:none;margin-bottom:10px;font-family:inherit}
#search:focus{border-color:#312e81}
#search::placeholder{color:#0f172a}

.sh{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:#0f172a;font-weight:700;margin:9px 0 4px}
.cats{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:2px}
.cb{padding:3px 6px;border-radius:3px;font-size:9px;font-weight:700;border:1px solid #0f172a;background:transparent;color:#1e293b;cursor:pointer;text-transform:uppercase;letter-spacing:.2px;transition:all .12s}
.cb:hover{color:#334155;border-color:#1e293b}
.cb.on{background:rgba(67,56,202,.12);color:#6366f1;border-color:rgba(67,56,202,.3)}
.cb.conf.on{background:rgba(239,68,68,.1);color:#ef4444;border-color:rgba(239,68,68,.3)}

.trow{display:flex;align-items:center;gap:6px;margin-bottom:3px;cursor:pointer;user-select:none}
.trow input{accent-color:#4338ca;cursor:pointer;flex-shrink:0}
.trow .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.trow span{font-size:11px;color:#1e293b;transition:color .1s}
.trow:hover span{color:#334155}

#stats{font-size:10px;color:#0f172a;margin-top:10px;padding-top:8px;border-top:1px solid #0a0f1a;line-height:1.7}

/* legend */
.leg{display:flex;align-items:center;gap:5px;margin-bottom:4px;font-size:10px;color:#1e293b}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── canvas area ── */
#canvas-wrap{flex:1;position:relative;overflow:hidden}
canvas{display:block;width:100%;height:100%}

/* ── tooltip ── */
#tip{position:fixed;pointer-events:none;display:none;z-index:60;background:rgba(6,10,18,.97);border:1px solid #0f172a;border-radius:7px;padding:10px 12px;font-size:11px;max-width:260px;line-height:1.6;box-shadow:0 8px 28px rgba(0,0,0,.7)}
#tip .tn{font-size:13px;font-weight:700;margin-bottom:1px}
#tip .tr{font-size:10px;color:#1e293b;margin-bottom:3px}
#tip .tc{font-size:10px;color:#0f172a;font-style:italic;margin-top:4px}

/* ── dossier ── */
#dos{position:fixed;top:0;right:0;bottom:0;width:440px;background:rgba(6,10,18,.99);border-left:1px solid #0f172a;z-index:50;transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
#dos.open{transform:translateX(0)}
#dos-hdr{padding:16px 18px 12px;border-bottom:1px solid #0a0f1a;flex-shrink:0;position:relative}
#dos-x{position:absolute;top:12px;right:12px;width:26px;height:26px;border-radius:4px;background:#0a0f1a;border:1px solid #0f172a;color:#1e293b;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#dos-x:hover{background:#0f172a;color:#e2e8f0}
#dos-name{font-size:17px;font-weight:800;color:#f1f5f9;margin-bottom:1px;padding-right:32px}
#dos-role{font-size:10px;color:#1e293b;margin-bottom:6px}
#dos-loc{font-size:10px;color:#0f172a;margin-bottom:7px}
#dos-badges{display:flex;flex-wrap:wrap;gap:3px}
.bdg{padding:2px 7px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:.3px}
#dos-body{flex:1;overflow-y:auto;padding:14px 18px 48px;scrollbar-width:thin;scrollbar-color:#0a0f1a transparent}
#dos-body::-webkit-scrollbar{width:3px}
.ds{margin-bottom:16px}
.ds h3{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:#0f172a;margin-bottom:6px;font-weight:700}
.ds p{font-size:11px;color:#334155;line-height:1.85}
.cal{border-left:2px solid #92400e;background:rgba(120,53,15,.06);padding:8px 11px;border-radius:0 4px 4px 0;font-size:10px;color:#78350f;line-height:1.7;margin:4px 0}
.cal.red{border-color:#991b1b;background:rgba(153,27,27,.06);color:#7f1d1d}
.cal.blue{border-color:#1e3a8a;background:rgba(30,58,138,.06);color:#1e3a8a}
.cal.gray{border-color:#1e293b;background:rgba(30,41,59,.06);color:#1e293b}
.cl{list-style:none}
.cl li{display:flex;justify-content:space-between;align-items:center;padding:5px 8px;border-radius:4px;margin-bottom:2px;cursor:pointer;border-left:2px solid transparent;transition:all .1s}
.cl li:hover{background:#0a0f1a;border-left-color:#4338ca}
.cn{font-size:10px;color:#334155;font-weight:500}
.cs{font-size:9px;padding:2px 5px;border-radius:3px;font-weight:700}
.cs-h{background:rgba(127,29,29,.08);color:#7f1d1d}
.cs-m{background:rgba(120,53,15,.08);color:#78350f}
.cs-l{background:rgba(30,41,59,.08);color:#1e293b}

if (typeof supplementalData !== 'undefined') {
  const ei = new Set(graphData.nodes.map(n => n.id));
  for (const n of supplementalData.nodes) if (!ei.has(n.id)) { graphData.nodes.push(n); ei.add(n.id); }
  const el = new Set(graphData.links.map(l => l.source+'→'+l.target));
  for (const l of supplementalData.links) { const k=l.source+'→'+l.target; if(!el.has(k)){graphData.links.push(l);el.add(k);} }
}

/* ── coordinate helper ── */
function latLonToVec3(lat, lon, r) {
  const phi   = (90 - lat) * (Math.PI / 180);
  const theta = (lon + 180) * (Math.PI / 180);
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
     r * Math.cos(phi),
     r * Math.sin(phi) * Math.sin(theta)
  );
}

/* ── NODES ── */

// Assign geo coords
NODES.forEach(n => {
  const g = GEO[n.id] || GEO.default;
  n.lat = g[0]; n.lon = g[1];
});

// Jitter overlapping nodes at same location
const locCount = {};
NODES.forEach(n => {
  const key = `${n.lat.toFixed(2)},${n.lon.toFixed(2)}`;
  locCount[key] = (locCount[key] || 0) + 1;
});
const locIdx = {};
NODES.forEach(n => {
  const key = `${n.lat.toFixed(2)},${n.lon.toFixed(2)}`;
  const idx = locIdx[key] = (locIdx[key] || 0) + 1;
  const total = locCount[key];
  if (total > 1) {
    const angle = (idx / total) * Math.PI * 2;
    const spread = Math.min(3.5, 1.2 + total * 0.3);
    n.lat += Math.sin(angle) * spread;
    n.lon += Math.cos(angle) * spread;
  }
});

const NODE_SURFACE_R = GLOBE_R + 0.004;
const NODE_LIFT      = 0.018;   // nodes sit slightly above surface

// 3D objects for each node
const nodeObjs = new Map();   // id → {mesh, labelCanvas, labelSprite, line}

function makeNodeMesh(d) {
  const r = Math.max(0.008, Math.min(0.028, (d.radius || 10) * 0.00085));
  const geo  = new THREE.SphereGeometry(r, 12, 8);
  const col  = nColor(d);
  const mat  = new THREE.MeshPhongMaterial({
    color: new THREE.Color(col),
    emissive: new THREE.Color(col),
    emissiveIntensity: 0.55,
    shininess: 30,
  });
  const mesh = new THREE.Mesh(geo, mat);
  const pos  = latLonToVec3(d.lat, d.lon, NODE_SURFACE_R + NODE_LIFT);
  mesh.position.copy(pos);
  mesh.userData = { id: d.id, node: d };
  return mesh;
}

function makeLabel(d) {
  const canvas = document.createElement('canvas');
  canvas.width = 256; canvas.height = 48;
  const c = canvas.getContext('2d');
  c.clearRect(0,0,256,48);
  c.fillStyle = nColor(d);
  c.font = 'bold 24px -apple-system,sans-serif';
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.fillText(d.label, 128, 24);
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(mat);
  const labelR = Math.max(0.008, Math.min(0.028, (d.radius||10)*0.00085));
  sprite.scale.set(0.22, 0.042, 1);
  return sprite;
}

// Arc between two points on a sphere
function makeArc(posA, posB, strength) {
  const mid = posA.clone().add(posB).multiplyScalar(0.5);
  const lift = 0.06 + (1 - strength) * 0.12;
  mid.normalize().multiplyScalar(GLOBE_R + lift);

  const points = [];
  const N = 32;
  for (let i = 0; i <= N; i++) {
    const t = i / N;
    const p = new THREE.Vector3().lerpVectors(posA, posB, t);
    // arc: lerp then blend toward midpoint-lifted
    const q = new THREE.Vector3().lerpVectors(p, mid, Math.sin(Math.PI * t) * 0.5);
    points.push(q);
  }
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const alpha = strength >= 0.8 ? 0.55 : strength >= 0.6 ? 0.32 : strength >= 0.4 ? 0.16 : 0.08;
  const col = strength >= 0.8 ? 0xef4444 : strength >= 0.6 ? 0xfb923c : strength >= 0.4 ? 0x60a5fa : 0x1e3a5f;
  const mat = new THREE.LineBasicMaterial({ color: col, transparent: true, opacity: alpha });
  return new THREE.Line(geo, mat);
}

/* Build scene objects */
function rebuildScene() {
  // clear
  while (nodeGroup.children.length) nodeGroup.remove(nodeGroup.children[0]);
  while (linkGroup.children.length) linkGroup.remove(linkGroup.children[0]);
  nodeObjs.clear();

  // links first (below nodes)
  LINKS.forEach(l => {
    const str = l.strength || 0.5;
    const sid = l.source.id || l.source;
    const tid = l.target.id || l.target;
    if (!visSet.has(sid) || !visSet.has(tid)) return;
    const sn = NODE_BY.get(sid), tn = NODE_BY.get(tid);
    if (!sn || !tn) return;
    const posA = latLonToVec3(sn.lat, sn.lon, NODE_SURFACE_R + NODE_LIFT);
    const posB = latLonToVec3(tn.lat, tn.lon, NODE_SURFACE_R + NODE_LIFT);
    linkGroup.add(makeArc(posA, posB, str));
  });

  // nodes
  NODES.forEach(d => {
    if (!visSet.has(d.id)) return;
    const mesh   = makeNodeMesh(d);
    const label  = makeLabel(d);
    const lpos   = latLonToVec3(d.lat, d.lon, NODE_SURFACE_R + NODE_LIFT + 0.038);
    label.position.copy(lpos);
    nodeGroup.add(mesh);
    nodeGroup.add(label);
    nodeObjs.set(d.id, { mesh, label });
  });
}

/* ── VISIBILITY ── */
function buildVis() {
  const catF = activeCat !== 'all' ? new Set(CATS[activeCat]||[]) : null;
  visSet = new Set();
  for (const n of NODES) {
    if (!activeTypes.has(n.type)) continue;
    if (catF && !catF.has(n.id)) continue;
    visSet.add(n.id);
  }
}

/* ── RAYCASTER (hit test) ── */
const raycaster = new THREE.Raycaster();
raycaster.params.Points = { threshold: 0.02 };

function getHit(ex, ey) {
  // ex/ey relative to canvas-wrap
  const rect = wrap.getBoundingClientRect();
  const mouse = new THREE.Vector2(
    ((ex - rect.left) / rect.width)  * 2 - 1,
   -((ey - rect.top)  / rect.height) * 2 + 1
  );
  raycaster.setFromCamera(mouse, camera);
  const meshes = [];
  nodeObjs.forEach(({mesh}) => meshes.push(mesh));
  const hits = raycaster.intersectObjects(meshes);
  return hits.length ? hits[0].object.userData.node : null;
}

/* ── ORBIT CONTROLS (manual) ── */
let isDragging = false, prevMX = 0, prevMY = 0;

}

const cvEl = document.getElementById('cv');

cvEl.addEventListener('mousedown', e => {
  isDragging = true; prevMX = e.clientX; prevMY = e.clientY;
  resetIdle();
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - prevMX, dy = e.clientY - prevMY;
  spherical.theta -= dx * 0.005;
  spherical.phi   += dy * 0.005;
  spherical.phi    = Math.max(0.15, Math.min(Math.PI - 0.15, spherical.phi));
  updateCamera();
  prevMX = e.clientX; prevMY = e.clientY;
});
window.addEventListener('mouseup', () => { isDragging = false; });

cvEl.addEventListener('wheel', e => {
  e.preventDefault();
  spherical.radius = Math.max(1.4, Math.min(6, spherical.radius + e.deltaY * 0.003));
  updateCamera(); resetIdle();
}, { passive: false });

// Touch orbit
let lastTouchDist = 0;
cvEl.addEventListener('touchstart', e => {
  if (e.touches.length === 1) { prevMX = e.touches[0].clientX; prevMY = e.touches[0].clientY; isDragging = true; }
  else if (e.touches.length === 2) {
    lastTouchDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
  }
  resetIdle();
}, {passive:true});
cvEl.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && isDragging) {
    const dx = e.touches[0].clientX - prevMX, dy = e.touches[0].clientY - prevMY;
    spherical.theta -= dx * 0.005; spherical.phi += dy * 0.005;
    spherical.phi = Math.max(0.15, Math.min(Math.PI-0.15, spherical.phi));
    updateCamera(); prevMX = e.touches[0].clientX; prevMY = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    spherical.radius = Math.max(1.4, Math.min(6, spherical.radius - (d-lastTouchDist)*0.01));
    updateCamera(); lastTouchDist = d;
  }
}, {passive:false});
cvEl.addEventListener('touchend', () => { isDragging = false; }, {passive:true});

    spherical.phi    = Math.PI/2;
    updateCamera();
  }

/* ── HIGHLIGHT on hover ── */
function updateHighlight() {
  nodeObjs.forEach(({mesh, label}, id) => {
    const d = NODE_BY.get(id);
    const col = nColor(d);
    if (!hovered) {
      mesh.material.opacity = 1; mesh.material.emissiveIntensity = 0.55;
      label.material.opacity = 0.85;
    } else if (id === hovered.id) {
      mesh.material.emissiveIntensity = 1.2;
      mesh.scale.setScalar(1.4);
      label.material.opacity = 1;
    } else {
      mesh.material.opacity = 0.18; mesh.material.emissiveIntensity = 0.15;
      mesh.scale.setScalar(1);
      label.material.opacity = 0.08;
    }
  });
}

  if(d.status){

    const fg=dead?'#334155':conv?'#7f1d1d':fled?'#78350f':c;

    bdg(d.status,bg,fg,fg.replace('rgb(','rgba(').replace(')',',0.2)'));
  }
  if(d.networth) bdg(d.networth,'rgba(6,78,59,.1)','#064e3b','rgba(6,78,59,.2)');

  const body=document.getElementById('dos-body'); const P=[];
  const CAL=(t,cls='')=>`<div class="cal ${cls}">${t}</div>`;
  if(CATS.uncertain?.includes(d.id)&&!CATS.named?.includes(d.id)) P.push(`<div class="ds">${CAL('Documented connection — role uncertain.','gray')}</div>`);
  if(d.intelRole)    P.push(`<div class="ds"><h3>Intel Assessment</h3>${CAL(d.intelRole,'red')}</div>`);
  if(d.epsteinLink)  P.push(`<div class="ds"><h3>Epstein Connection</h3>${CAL(d.epsteinLink)}</div>`);
  if(d.significance) P.push(`<div class="ds"><h3>Why This Matters</h3>${CAL(d.significance,'blue')}</div>`);
  if(d.desc)         P.push(`<div class="ds"><h3>Summary</h3><p>${d.desc}</p></div>`);

  const nc=Object.entries(CATS).filter(([,v])=>v.includes(d.id)).map(([k])=>CAT_NAMES[k]).filter(Boolean);

  const conns=[];
  LINKS.forEach(l=>{

    if(sid===d.id){const t=NODE_BY.get(tid);if(t) conns.push({n:t,s:l.strength||0.5,dir:'→'});}

  }</ul></div>`);

  body.innerHTML=P.join('');
  body.querySelectorAll('.cl li[data-id]').forEach(li=>li.addEventListener('click',()=>{ const n=NODE_BY.get(li.dataset.id); if(n) openDos(n); }));
  document.getElementById('dos').classList.add('open');

  // spin globe to face this node
  const geo2 = GEO[d.id]||GEO.default;
  const targetTheta = -(geo2[1] + 180) * (Math.PI / 180);
  const targetPhi   = (90 - geo2[0]) * (Math.PI / 180);
  const startTheta  = spherical.theta, startPhi = spherical.phi;
  let t = 0;
  function spinTo() {
    t += 0.04;
    if (t >= 1) { spherical.theta = targetTheta; spherical.phi = targetPhi; updateCamera(); return; }
    const ease = 1 - Math.pow(1 - t, 3);
    spherical.theta = startTheta + (targetTheta - startTheta) * ease;
    spherical.phi   = startPhi   + (targetPhi   - startPhi)  * ease;
    updateCamera(); requestAnimationFrame(spinTo);
  }
  spinTo();
}

document.getElementById('dos-x').onclick = () => document.getElementById('dos').classList.remove('open');

updateStats();
