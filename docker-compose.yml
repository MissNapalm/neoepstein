version: '3.8'
services:
  neo4j:
    image: neo4j:5-community
    container_name: epstein-graph
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/epstein2024
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - ./neo4j_data:/data
    restart: unless-stopped